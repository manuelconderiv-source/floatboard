// Unwrap all [data-fmt] spans in a subtree, keeping their children
function _flattenFmt(root) {
  Array.from(root.querySelectorAll('[data-fmt]')).forEach(s => {
    const p = s.parentNode; if (!p) return;
    while (s.firstChild) p.insertBefore(s.firstChild, s);
    p.removeChild(s);
  });
}

// Remove any [data-fmt] spans that ended up empty after DOM surgery
function _cleanEmpty(root) {
  Array.from(root.querySelectorAll('[data-fmt]')).forEach(s => {
    if (!s.textContent) s.remove();
  });
}

// Write all style properties onto a span element
function _applyStyleToSpan(span, style) {
  span.dataset.fmt      = style.label;
  span.style.fontSize   = style.fontSize;
  span.style.fontWeight = style.fontWeight;
  span.style.fontStyle  = style.fontStyle;
  span.style.color      = style.color;
}

function applyFmt(style) {
  if (!fmtContent || !fmtData) return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  if (!fmtContent.contains(range.commonAncestorContainer)) return;

  // ── Case A: selection sits entirely inside one fmt span ───────
  // This is the common case: click H1 text, change to FN, toggle off, etc.
  // Handle it with an in-place mutation — no extraction needed.
  const anchor = range.commonAncestorContainer;
  const anchorEl = anchor.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor;
  const enclosing = anchorEl.closest('[data-fmt]');

  if (enclosing && fmtContent.contains(enclosing)) {
    if (enclosing.dataset.fmt === style.label) {
      // Same style → toggle off (unwrap)
      const p = enclosing.parentNode;
      while (enclosing.firstChild) p.insertBefore(enclosing.firstChild, enclosing);
      p.removeChild(enclosing);
    } else {
      // Different style → restyle in-place, all properties replaced
      _applyStyleToSpan(enclosing, style);
    }
    fmtContent.normalize();
    fmtData.content = fmtContent.innerHTML;
    save();
    return;
  }

  // ── Case B: plain text or selection crossing multiple spans ───
  // Build a fresh span, extract the selection into it.
  const span = document.createElement('span');
  _applyStyleToSpan(span, style);

  try {
    // Works when the range doesn't partially straddle any element boundary
    range.surroundContents(span);
  } catch {
    // Range crosses element boundaries — extract, flatten, rewrap
    const frag = range.extractContents();
    _flattenFmt(frag);
    span.appendChild(frag);
    range.insertNode(span);
  }

  _cleanEmpty(fmtContent);
  fmtContent.normalize();
  fmtData.content = fmtContent.innerHTML;
  save();
}

// ── COLLECT / TIDY ────────────────────────────────────────────
// Multi-column layout that guarantees all cards stay inside viewport.
// Fills each column top-to-bottom until (innerHeight - 40px), then
// starts the next column. Column count grows as needed.
// ── COLLECT DIRECTIONAL POPUP ─────────────────────────────────
const collectBtn   = document.getElementById('collect-btn');
const collectPopup = document.getElementById('collect-popup');
let collectHoverTimer = null;

collectBtn.addEventListener('mouseenter', () => {

    collectPopup.style.bottom = (window.innerHeight - rect.top + 6) + 'px';
    collectPopup.classList.add('visible');
  }, 400);
});
collectBtn.addEventListener('mouseleave', () => {

    if (!collectPopup.matches(':hover')) collectPopup.classList.remove('visible');
  }, 200);
});
collectPopup.addEventListener('mouseleave', () => collectPopup.classList.remove('visible'));

collectPopup.querySelectorAll('.collect-dir').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    collectPopup.classList.remove('visible');
    doCollect(btn.dataset.dir);
  });
});
// Default click = collect to the same side as the toolbar (only if popup isn't showing)
collectBtn.addEventListener('click', () => {
  if (collectPopup.classList.contains('visible')) return; // let direction buttons handle it
  const side = document.body.classList.contains('snapped-left') ? 'left' : 'right';
  doCollect(side);
});

function doCollect(direction) {
  if (!cards.length) return;
  pushHistory();

  const maxH      = window.innerHeight - 40;
  const colStartX = 20;
  const colGap    = 12;

  // Clear all snap relationships; collect creates a fresh chain
  cards.forEach(c => { c.snapParent = null; c.snapChildren = []; });

  // Build items: single cards or group blocks (groups treated as one unit)
  const processedGroups = new Set();
  const sortedAll = [...cards].sort((a, b) => a.y - b.y || a.x - b.x);

  // items: { type:'card', data, h, w } | { type:'group', group, members:[{data,el,h,w,relY}], h, w }
  const items = [];
  for (const d of sortedAll) {
    // Skip locked cards and locked groups
    if (d.locked && !d.groupId) continue;
    if (d.groupId) {
      if (processedGroups.has(d.groupId)) continue;
      processedGroups.add(d.groupId);
      const g = groups.find(gg => gg.id === d.groupId);
      if (g && g.locked) continue; // locked groups stay in place
      if (!g) { // orphaned groupId — treat as regular card
        const e = document.querySelector(`.card[data-id="${d.id}"]`);
        items.push({ type: 'card', data: d, h: e ? e.offsetHeight : 200, w: e ? e.offsetWidth : 260 });
        continue;
      }
      const members = g.memberIds
        .map(id => {
          const c = cards.find(cc => cc.id === id);
          const e = document.querySelector(`.card[data-id="${id}"]`);
          return c && e ? { data: c, el: e, h: e.offsetHeight, w: e.offsetWidth } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.data.y - b.data.y);
      if (!members.length) continue;
      const baseY = members[0].data.y;
      members.forEach(m => { m.relY = m.data.y - baseY; });
      const groupW = Math.max(...members.map(m => m.w));
      const groupH = members[members.length-1].relY + members[members.length-1].h;
      items.push({ type: 'group', group: g, members,
        w: groupW + GROUP_PAD * 2,
        h: GROUP_HEADER_H + GROUP_PAD + groupH + GROUP_PAD });
    } else {
      const e = document.querySelector(`.card[data-id="${d.id}"]`);
      items.push({ type: 'card', data: d,
        h: e ? e.offsetHeight : (d.minimized ? 44 : 200),
        w: e ? e.offsetWidth  : (d.cardWidth || 260) });
    }
  }

  const TOOLBAR_MARGIN = 28 + 48 + 12;
  const maxW = window.innerWidth - 40;
  const MARGIN = 20;

  // Assign final (x, y) to each item based on direction
  function placeItem(item, x, y) {
    if (item.type === 'card') {
      item.data.x = x; item.data.y = y;
      const e = document.querySelector(`.card[data-id="${item.data.id}"]`);
      if (e) springElTo(item.data, e, x, y);
    } else {
      const baseX = x + GROUP_PAD;
      const baseY = y + GROUP_HEADER_H + GROUP_PAD;
      item.members.forEach(({ data: d, el, relY }) => {
        d.x = baseX; d.y = baseY + relY;
        if (el) springElTo(d, el, d.x, d.y);
      });
    }
  }

  if (direction === 'left' || direction === 'right') {
    // ── COLUMN LAYOUT: stack top-to-bottom, wrap into new columns ──
    const cols = [];
    let colX = MARGIN, curCol = [], curH = 0;
    for (const item of items) {
      const gap = curCol.length > 0 ? SNAP_GAP : 0;
      if (curH + gap + item.h > maxH && curCol.length > 0) {
        cols.push({ x: colX, items: curCol });
        colX += Math.max(...curCol.map(it => it.w)) + colGap;
        curCol = []; curH = 0;
      }
      curCol.push(item);
      curH += (curCol.length > 1 ? SNAP_GAP : 0) + item.h;
    }
    if (curCol.length) cols.push({ x: colX, items: curCol });

    // Compute total width and anchor
    const totalW = cols.reduce((s, c, i) => s + Math.max(...c.items.map(it => it.w)) + (i < cols.length - 1 ? colGap : 0), 0);
    let offX;
    if (direction === 'right') offX = window.innerWidth - TOOLBAR_MARGIN - totalW - MARGIN;
    else offX = TOOLBAR_MARGIN - MARGIN;
    cols.forEach(c => c.x += offX);

    // Position
    cols.forEach(col => {
      let y = MARGIN;
      const colW = Math.max(...col.items.map(it => it.w));
      col.items.forEach(item => {
        // Right-align: push narrower cards to the right edge of the column
        const x = direction === 'right' ? col.x + colW - item.w : col.x;
        placeItem(item, x, y);
        y += item.h + SNAP_GAP;
      });
    });

  } else {
    // ── ROW LAYOUT: arrange side-by-side, wrap into new rows ──
    const rows = [];
    let curRow = [], curW = 0;
    for (const item of items) {
      const gap = curRow.length > 0 ? colGap : 0;
      if (curW + gap + item.w > maxW && curRow.length > 0) {
        rows.push(curRow);
        curRow = []; curW = 0;
      }
      curRow.push(item);
      curW += (curRow.length > 1 ? colGap : 0) + item.w;
    }
    if (curRow.length) rows.push(curRow);

    if (direction === 'top') {
      // Rows from top edge downward, cards top-aligned in each row
      let y = MARGIN;
      rows.forEach(row => {
        const rowW = row.reduce((s, it, i) => s + it.w + (i > 0 ? colGap : 0), 0);
        let x = Math.max(MARGIN, (window.innerWidth - rowW) / 2);
        const rowH = Math.max(...row.map(it => it.h));
        row.forEach(item => {
          placeItem(item, x, y);
          x += item.w + colGap;
        });
        y += rowH + SNAP_GAP;
      });
    } else {
      // direction === 'bottom': rows from bottom edge upward, cards bottom-aligned
      const totalH = rows.reduce((s, row, i) => s + Math.max(...row.map(it => it.h)) + (i > 0 ? SNAP_GAP : 0), 0);
      let y = Math.max(MARGIN, window.innerHeight - totalH - MARGIN);
      rows.forEach(row => {
        const rowW = row.reduce((s, it, i) => s + it.w + (i > 0 ? colGap : 0), 0);
        let x = Math.max(MARGIN, (window.innerWidth - rowW) / 2);
        const rowH = Math.max(...row.map(it => it.h));
        row.forEach(item => {
          // Bottom-align: push shorter cards down within the row
          const itemY = y + rowH - item.h;
          placeItem(item, x, itemY);
          x += item.w + colGap;
        });
        y += rowH + SNAP_GAP;
      });
    }
  }

  // Update all group frames to reflect new positions
  groups.forEach(g => updateGroupFrame(g.id));

  setTimeout(save, 650);
}

const PREMIUM_TYPES = new Set(['usage', 'schedule', 'pomodoro', 'stopwatch', 'countdown', 'habits']);
const CARD_TITLES   = { todo: 'new list', text: 'note', image: 'image', usage: 'Claude usage', schedule: 'schedule', pomodoro: 'pomodoro', stopwatch: 'stopwatch', countdown: 'countdown', habits: 'habits' };
const CARD_ACCENTS  = { usage: '#fb923c', schedule: '#60a5fa', pomodoro: '#f472b6', stopwatch: '#06b6d4', countdown: '#ef4444', habits: '#10b981' };

function spawnCard(type) {
    // Premium-gated types
    if (PREMIUM_TYPES.has(type) && !premiumMode) {
      showPremiumToast('Upgrade to unlock this card');
      picker.classList.remove('visible');
      addBtn.classList.remove('open');
      return;
    }
    const pos  = getSpawnPos(null);
    const newCard = {
      id: uid(), type,
      accent: CARD_ACCENTS[type] || randAccent(),
      title: CARD_TITLES[type] || type,
      minimized: false, locked: false, groupId: null,
      x: pos.x, y: pos.y,
      z: ++zCounter,
      bodyHeight: null, cardWidth: null, snapParent: null, snapChildren: [],
      items:   (type === 'todo' || type === 'schedule') ? [] : undefined,
      content: type === 'text' ? '' : undefined,
      imageData: null, imageAspectRatio: null,
      usagePlan: type === 'usage' ? 45 : undefined,
      workMins: type === 'pomodoro' ? 25 : undefined,
      breakMins: type === 'pomodoro' ? 5 : undefined,
      longBreakMins: type === 'pomodoro' ? 15 : undefined,
      sessionsTarget: type === 'pomodoro' ? 4 : undefined,
    };
    pushHistory();
    cards.push(newCard);
    save();
    const cardEl = buildCard(newCard);
    cardEl.classList.add('spawning');
    document.getElementById('canvas').appendChild(cardEl);
    cardEl.addEventListener('animationend', () => cardEl.classList.remove('spawning'), { once: true });
    updateEmptyState();
    picker.classList.remove('visible');
    addBtn.classList.remove('open');

    requestAnimationFrame(() => {
      const anchor   = lastEditedCardId ? cards.find(c => c.id === lastEditedCardId) : null;
      const anchorEl = anchor && anchor.id !== newCard.id
        ? document.querySelector(`.card[data-id="${anchor.id}"]`) : null;
      let snapped = false;

      if (anchor && anchorEl) {
        const aW = anchorEl.offsetWidth, aH = anchorEl.offsetHeight;
        const hasBottomChild = (anchor.snapChildren || []).some(ch => ch.edge === 'top');
        let sx, sy, edge;
        if (!hasBottomChild) { sx = anchor.x; sy = anchor.y + aH + SNAP_GAP; edge = 'top'; }
        else                  { sx = anchor.x + aW + SNAP_GAP; sy = anchor.y; edge = 'left'; }
        const clamped = clampToViewport(sx, sy, cardEl.offsetWidth, cardEl.offsetHeight);
        newCard.x = clamped.x; newCard.y = clamped.y;
        cardEl.style.left = clamped.x + 'px'; cardEl.style.top = clamped.y + 'px';
        attachToSnapGraph(newCard, [{ toId: anchor.id, myEdge: edge }]);
        save(); snapped = true;
      }

      if (!snapped) {
        const snap = computeSnap(newCard.x, newCard.y, cardEl.offsetWidth, cardEl.offsetHeight, newCard.id);
        if (snap.links.length) {
          const clamped = clampToViewport(snap.x, snap.y, cardEl.offsetWidth, cardEl.offsetHeight);
          newCard.x = clamped.x; newCard.y = clamped.y;
          cardEl.style.left = clamped.x + 'px'; cardEl.style.top = clamped.y + 'px';
          attachToSnapGraph(newCard, snap.links);
          save();
        }
      }

      const titleEl = cardEl.querySelector('.card-title');
      if (titleEl) {
        titleEl.setAttribute('contenteditable', 'true');
        titleEl.style.cursor = 'text'; titleEl.focus();
        const sel = window.getSelection(), range = document.createRange();
        range.selectNodeContents(titleEl);
        sel.removeAllRanges(); sel.addRange(range);
      }
    });
}

// ── FAVORITES ──────────────────────────────────────────────────
const FAV_KEY = 'floatboard_favorites';
function getFavorites() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; }
}
function setFavorites(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr.slice(0, 3))); }

function rebuildFavorites() {
  const favSection = picker.querySelector('.picker-fav-section');
  const favs = getFavorites();
  // Remove old cloned buttons
  favSection.querySelectorAll('.picker-btn').forEach(b => b.remove());
  if (favs.length === 0) { favSection.style.display = 'none'; return; }
  favSection.style.display = '';
  favs.forEach(type => {
    const srcBtn = picker.querySelector(`.picker-category .picker-btn[data-type="${type}"]`);
    if (!srcBtn) return;
    const clone = srcBtn.cloneNode(true);
    clone.addEventListener('click', () => spawnCard(type));
    clone.addEventListener('contextmenu', e => showPickerCtxMenu(e, type));
    favSection.appendChild(clone);
  });
}

function showPickerCtxMenu(e, type) {
  e.preventDefault(); e.stopPropagation();
  // Remove any existing picker ctx menus
  document.querySelectorAll('.picker-ctx-menu').forEach(m => m.remove());
  const favs = getFavorites();
  const isFav = favs.includes(type);
  const menu = document.createElement('div');
  menu.className = 'picker-ctx-menu';
  const btn = document.createElement('button');
  btn.textContent = isFav ? 'Remove from favorites' : 'Add to favorites';
  btn.addEventListener('click', () => {
    let updated = getFavorites();
    if (isFav) { updated = updated.filter(t => t !== type); }
    else if (updated.length < 3) { updated.push(type); }
    setFavorites(updated);
    rebuildFavorites();
    menu.remove();
  });
  menu.appendChild(btn);
  document.body.appendChild(menu);
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 40) + 'px';
  const dismiss = () => { menu.remove(); document.removeEventListener('click', dismiss); };
  setTimeout(() => document.addEventListener('click', dismiss), 10);
}

    btn.addEventListener('click', () => spawnCard(btn.dataset.type));
    btn.addEventListener('contextmenu', e => showPickerCtxMenu(e, btn.dataset.type));

document.getElementById('canvas').addEventListener('contextmenu', e => {

  if (e.target.closest('.card') || e.target.closest('.group-frame')) return;
  e.preventDefault();

function showCanvasCtxMenu(mx, my) {
  ctxMenu.innerHTML = '';

  function item(label, fn, danger = false) {
    const d = document.createElement('div');
    d.className   = 'ctx-item' + (danger ? ' danger' : '');
    d.textContent = label;
    d.addEventListener('click', () => { hideCtxMenu(); fn(); });
    ctxMenu.appendChild(d);
  }

  item('Export cards (JSON)', () => {
    const withImages = confirm('Include images in export?\n\nYes = larger file (~MB)\nNo = smaller file, images excluded');
    const data = cards.map(c => {
      if (!withImages && c.type === 'image') {
        const { imageData, ...rest } = c;
        return rest;
      }
      return c;
    });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'floatboard-export.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  item('Import cards (JSON)', () => {
    const input    = document.createElement('input');
    input.type     = 'file';
    input.accept   = '.json,application/json';
    input.addEventListener('change', () => {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported)) { alert('Invalid file — expected a JSON array.'); return; }
          pushHistory();
          // Remap ids to avoid collisions, clear snap graph for imported cards
          const idMap = {};
          imported.forEach(c => {
            const newId = uid();
            idMap[c.id] = newId;
            c.id          = newId;
            c.snapParent  = null;
            c.snapChildren = [];
            c.z            = ++zCounter;
            // Offset position so imported cards don't sit exactly on existing ones
            c.x = (c.x || 20) + 30;
            c.y = (c.y || 20) + 30;
            const clamped = clampToViewport(c.x, c.y, c.cardWidth || 260, 200);
            c.x = clamped.x; c.y = clamped.y;
            if (c.items) c.items = c.items.map(it => ({ ...it, id: uid() }));
          });
          imported.forEach(c => cards.push(c));
          renderAll();
          save();
        } catch(err) {
          alert('Failed to import: ' + err.message);
        }
      };
      reader.readAsText(file);
    });
    input.click();
  });

  ctxMenu.style.left = '0';
  ctxMenu.style.top  = '0';
  ctxMenu.classList.add('visible');
  const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
  ctxMenu.style.left = Math.min(mx, window.innerWidth  - mw - 8) + 'px';
  ctxMenu.style.top  = Math.min(my, window.innerHeight - mh - 8) + 'px';
}

// ── GROUP CONTEXT MENU ────────────────────────────────────────
function showGroupCtxMenu(groupId, mx, my) {
  const g = groups.find(gg => gg.id === groupId);
  if (!g) return;
  ctxMenu.innerHTML = '';

  function item(label, fn) {
    const d = document.createElement('div');
    d.className   = 'ctx-item';
    d.textContent = label;
    d.addEventListener('click', () => { hideCtxMenu(); fn(); });
    ctxMenu.appendChild(d);
  }
  function divider() {
    const d = document.createElement('div');
    d.className = 'ctx-divider';
    ctxMenu.appendChild(d);
  }

  function getMembers() {
    return g.memberIds.map(id => ({
      c:  cards.find(cc => cc.id === id),
      el: document.querySelector(`.card[data-id="${id}"]`)
    })).filter(m => m.c && m.el);
  }

  item('Auto stack vertical', () => {
    pushHistory();
    const members = getMembers();
    members.sort((a, b) => a.c.y - b.c.y);
    const leftX = Math.min(...members.map(m => m.c.x));
    let curY = members[0].c.y;
    members.forEach(({ c, el }) => {
      c.x = leftX; c.y = curY;
      el.style.left = leftX + 'px'; el.style.top = curY + 'px';
      curY += el.offsetHeight + SNAP_GAP;
    });
    updateGroupFrame(groupId); save();
  });

  item('Auto stack horizontal', () => {
    pushHistory();
    const members = getMembers();
    members.sort((a, b) => a.c.x - b.c.x);
    const topY = Math.min(...members.map(m => m.c.y));
    let curX = members[0].c.x;
    members.forEach(({ c, el }) => {
      c.x = curX; c.y = topY;
      el.style.left = curX + 'px'; el.style.top = topY + 'px';
      curX += el.offsetWidth + SNAP_GAP;
    });
    updateGroupFrame(groupId); save();
  });

  item('Collapse all', () => {
    pushHistory();
    getMembers().forEach(({ c, el }) => {
      if (!c.minimized) {
        c.minimized = true; el.classList.add('minimized');
        const mb = el.querySelector('.minimize-btn'); if (mb) mb.title = 'Expand';
      }
    });
    requestAnimationFrame(() => updateGroupFrame(groupId)); save();
  });

  item('Expand all', () => {
    pushHistory();
    getMembers().forEach(({ c, el }) => {
      if (c.minimized) {
        c.minimized = false; el.classList.remove('minimized');
        const mb = el.querySelector('.minimize-btn'); if (mb) mb.title = 'Minimize';
      }
    });
    requestAnimationFrame(() => { updateGroupFrame(groupId); resolveGroupOverlaps(groupId); }); save();
  });

  divider();

  const isGroupLocked = g.locked;
  item(isGroupLocked ? 'Unlock group' : 'Lock group', () => {
    pushHistory();
    g.locked = !g.locked;
    const frame = document.querySelector(`.group-frame[data-group-id="${groupId}"]`);
    getMembers().forEach(({ c, el }) => {
      c.locked = g.locked;
      el.classList.toggle('locked', g.locked);
      const li = el.querySelector('.lock-icon');
      if (li) li.style.display = g.locked ? '' : 'none';
    });
    if (frame) frame.classList.toggle('group-locked', g.locked);
    save();
  });

  divider();

  item('Ungroup', () => { pushHistory(); dissolveGroup(groupId); save(); });

  ctxMenu.style.left = '0'; ctxMenu.style.top = '0';
  ctxMenu.classList.add('visible');
  const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
  ctxMenu.style.left = Math.min(mx, window.innerWidth  - mw - 8) + 'px';
  ctxMenu.style.top  = Math.min(my, window.innerHeight - mh - 8) + 'px';
}

// ── SAVE SLOTS ───────────────────────────────────────────────
let activeSlot = parseInt(localStorage.getItem('floatboard_slot') || '1', 10);
function getSlotKey(slot) { return slot === 1 ? 'default' : 'slot' + slot; }

function switchSlot(slot) {
  // Save current board to current slot
  if (window.electronAPI && window.electronAPI.saveData) {
    const key = getSlotKey(activeSlot);
    const json = JSON.stringify({ cards, groups, theme: currentTheme, slot: key });
    localStorage.setItem('floatboard_board_' + key, json);
  }
  save();

  // Switch
  activeSlot = slot;
  localStorage.setItem('floatboard_slot', String(slot));

  // Load new slot
  const slotData = localStorage.getItem('floatboard_board_' + getSlotKey(slot));
  if (slotData) {
    try {
      const parsed = JSON.parse(slotData);
      cards  = _hydrateCards(parsed.cards || []);
      groups = _sanitizeGroups(parsed.groups || []);
      if (parsed.theme) applyTheme(parsed.theme);
    } catch(_) { cards = []; groups = []; }
  } else {
    cards = []; groups = [];
  }
  renderAll();
  save();
}

// ── SETTINGS PANEL ───────────────────────────────────────────
const settingsBtn   = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');

function buildSettingsPanel() {
  settingsPanel.innerHTML = '';

  // Board slots
  const slotLabel = document.createElement('div');
  slotLabel.className = 'settings-label';
  slotLabel.textContent = 'Board';
  settingsPanel.appendChild(slotLabel);

  [1, 2, 3].forEach(slot => {
    const btn = document.createElement('button');
    const isPro = slot > 1;
    const isActive = activeSlot === slot;
    btn.className = 'settings-item' + (isActive ? ' active' : '');
    btn.innerHTML = 'Board ' + slot + (isPro && !premiumMode ? '<span class="pro-badge" style="margin-left:auto">PRO</span>' : '');
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (isPro && !premiumMode) { showPremiumToast('Upgrade to unlock save slots'); return; }
      if (isActive) return;
      switchSlot(slot);
      settingsPanel.classList.remove('visible');
      settingsBtn.classList.remove('open');
    });
    settingsPanel.appendChild(btn);
  });

  // Divider
  const div0 = document.createElement('div');
  div0.className = 'settings-divider';
  settingsPanel.appendChild(div0);

  // Themes
  const themeLabel = document.createElement('div');
  themeLabel.className = 'settings-label';
  themeLabel.textContent = 'Theme';
  settingsPanel.appendChild(themeLabel);

  ['default', 'glass', 'neumorphism'].forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'settings-item' + (currentTheme === t ? ' active' : '');
    const isPro = t !== 'default';
    btn.innerHTML = t.charAt(0).toUpperCase() + t.slice(1) + (isPro && !premiumMode ? '<span class="pro-badge" style="margin-left:auto">PRO</span>' : '');
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (isPro && !premiumMode) { showPremiumToast('Upgrade to unlock themes'); return; }
      applyTheme(t);
      buildSettingsPanel();
    });
    settingsPanel.appendChild(btn);
  });

  // Divider
  const div1 = document.createElement('div');
  div1.className = 'settings-divider';
  settingsPanel.appendChild(div1);

  // ── Templates section (premium) ──────────────
  if (premiumMode) {
    const divT = document.createElement('div');
    divT.className = 'settings-divider';
    settingsPanel.appendChild(divT);

    const tplLabel = document.createElement('div');
    tplLabel.className = 'settings-label';
    tplLabel.textContent = 'Templates';
    settingsPanel.appendChild(tplLabel);

    // Save as template
    const saveTemplateBtn = document.createElement('button');
    saveTemplateBtn.className = 'settings-item';
    saveTemplateBtn.innerHTML = '<span style="font-size:14px">+</span> Save current board';
    saveTemplateBtn.addEventListener('click', e => {
      e.stopPropagation();
      const templates = JSON.parse(localStorage.getItem('floatboard_templates') || '[]');
      if (templates.length >= 5) {
        showPremiumToast('Max 5 templates. Delete one first.');
        return;
      }
      const name = prompt('Template name:');
      if (!name || !name.trim()) return;
      const tplCards = cards.map(c => {
        const copy = Object.assign({}, c);
        delete copy.imageData;
        return copy;
      });
      templates.push({ id: uid(), name: name.trim(), timestamp: Date.now(), cards: tplCards });
      localStorage.setItem('floatboard_templates', JSON.stringify(templates));
      showPremiumToast('Template saved');
      buildSettingsPanel();
    });
    settingsPanel.appendChild(saveTemplateBtn);

    // Template list
    const templates = JSON.parse(localStorage.getItem('floatboard_templates') || '[]');
    if (templates.length > 0) {
      const tplList = document.createElement('div');
      tplList.className = 'template-list';
      templates.forEach(tpl => {
        const row = document.createElement('div');
        row.className = 'template-item';
        const nm = document.createElement('span');
        nm.className = 'template-name';
        nm.textContent = tpl.name;
        const del = document.createElement('button');
        del.className = 'template-delete';
        del.textContent = '\u00d7';
        del.addEventListener('click', e2 => {
          e2.stopPropagation();
          const updated = templates.filter(t => t.id !== tpl.id);
          localStorage.setItem('floatboard_templates', JSON.stringify(updated));
          showPremiumToast('Template deleted');
          buildSettingsPanel();
        });
        row.appendChild(nm); row.appendChild(del);
        row.addEventListener('click', e2 => {
          e2.stopPropagation();
          settingsPanel.classList.remove('visible');
          settingsBtn.classList.remove('open');
          showConfirm('Replace current board with template "' + tpl.name + '"?', () => {
            pushHistory();
            cards = JSON.parse(JSON.stringify(tpl.cards));
            groups = [];
            document.querySelectorAll('.group-frame').forEach(f => f.remove());
            renderAll(); save();
            showPremiumToast('Template loaded');
          });
        });
        tplList.appendChild(row);
      });
      settingsPanel.appendChild(tplList);
    }
  } else {
    const divT = document.createElement('div');
    divT.className = 'settings-divider';
    settingsPanel.appendChild(divT);

    const tplLabel = document.createElement('div');
    tplLabel.className = 'settings-label';
    tplLabel.textContent = 'Templates';
    settingsPanel.appendChild(tplLabel);

    const tplLocked = document.createElement('button');
    tplLocked.className = 'settings-item';
    tplLocked.innerHTML = 'Save templates <span class="pro-badge" style="margin-left:auto">PRO</span>';
    tplLocked.addEventListener('click', e => { e.stopPropagation(); showPremiumToast('Upgrade to save templates'); });
    settingsPanel.appendChild(tplLocked);
  }

  // ── Export board as image (premium) ─────────
  if (premiumMode) {
    const divE = document.createElement('div');
    divE.className = 'settings-divider';
    settingsPanel.appendChild(divE);

    const exportBtn = document.createElement('button');
    exportBtn.className = 'settings-item';
    exportBtn.innerHTML = '<span style="font-size:14px">&#128247;</span> Export as image';
    exportBtn.addEventListener('click', async e => {
      e.stopPropagation();
      settingsPanel.classList.remove('visible');
      settingsBtn.classList.remove('open');
      if (!window.electronAPI?.captureBoard) {
        showPremiumToast('Export requires Electron');
        return;
      }
      // Temporarily hide toolbar UI
      const uiEls = document.querySelectorAll('#add-btn, #settings-btn, #toolbar-expand, #undo-btn, #collect-btn, #btn-snap, #kofi-btn, #gb-close, #gb-pin, #gb-min, #minimize-pill, #premium-toast, #empty-state, #version-label, #picker, #settings-panel, #ctx-menu, #fmt-toolbar');
      uiEls.forEach(u => u.style.visibility = 'hidden');
      await new Promise(r => setTimeout(r, 100));
      try {
        const dataUrl = await window.electronAPI.captureBoard();
        const link = document.createElement('a');
        link.href = dataUrl;
        link.download = 'floatboard-' + Date.now() + '.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showPremiumToast('Board exported!');
      } catch (err) {
        showPremiumToast('Export failed');
      }
      uiEls.forEach(u => u.style.visibility = '');
    });
    settingsPanel.appendChild(exportBtn);
  } else {
    const divE = document.createElement('div');
    divE.className = 'settings-divider';
    settingsPanel.appendChild(divE);

    const exportLocked = document.createElement('button');
    exportLocked.className = 'settings-item';
    exportLocked.innerHTML = 'Export as image <span class="pro-badge" style="margin-left:auto">PRO</span>';
    exportLocked.addEventListener('click', e => { e.stopPropagation(); showPremiumToast('Upgrade to export board'); });
    settingsPanel.appendChild(exportLocked);
  }

  // Divider before danger zone
  const div2 = document.createElement('div');
  div2.className = 'settings-divider';
  settingsPanel.appendChild(div2);

  // Clear all
  const clearBtn = document.createElement('button');
  clearBtn.className = 'settings-item danger';
  clearBtn.textContent = 'Clear all cards';
  clearBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (!cards.length) return;
    settingsPanel.classList.remove('visible');
    settingsBtn.classList.remove('open');
    showConfirm('Remove all cards and groups? This cannot be undone.', () => {
      pushHistory();
      cards = []; groups = [];
      document.querySelectorAll('.group-frame').forEach(f => f.remove());
      renderAll(); save();
    });
  });
  settingsPanel.appendChild(clearBtn);
}

settingsBtn.addEventListener('click', e => {
  e.stopPropagation();
  picker.classList.remove('visible');
  addBtn.classList.remove('open');
  const wasOpen = settingsPanel.classList.contains('visible');
  settingsPanel.classList.toggle('visible');
  settingsBtn.classList.toggle('open');
  if (!wasOpen) buildSettingsPanel();
});

document.addEventListener('click', () => {
  settingsPanel.classList.remove('visible');
  settingsBtn.classList.remove('open');
});
settingsPanel.addEventListener('click', e => e.stopPropagation());

// ── KO-FI ──────────────────────────────────────────────────────
const KOFI_URL = 'https://ko-fi.com/manuelconde';
document.getElementById('kofi-btn').addEventListener('click', e => {
  e.stopPropagation();
  if (window.electronAPI && window.electronAPI.openExternal) {

// ── MINIMIZE TO PILL BAR ─────────────────────────────────────
const minimizePill = document.getElementById('minimize-pill');
let isMinimizedToBar = false;

const UI_ELEMENTS = '#canvas, #add-btn, #toolbar-expand, #settings-btn, #collect-btn, #undo-btn, #btn-snap, #kofi-btn, #gb-close, #gb-pin, #gb-min, #empty-state, #version-label';

function minimizeToBar() {
  isMinimizedToBar = true;
  document.body.classList.remove('toolbar-open');
  settingsPanel.classList.remove('visible');
  picker.classList.remove('visible');

  // Get pill target position for the suction effect
  const pillRect = minimizePill.getBoundingClientRect();
  const targetX  = pillRect.left + pillRect.width / 2 || window.innerWidth - 80;
  const targetY  = pillRect.top + pillRect.height / 2 || window.innerHeight - 30;

  // Animate each card toward the pill position
  document.querySelectorAll('.card').forEach((el, i) => {
    const rect = el.getBoundingClientRect();
    const dx = targetX - (rect.left + rect.width / 2);
    const dy = targetY - (rect.top + rect.height / 2);
    el.style.transition = `transform 0.4s cubic-bezier(0.6, 0, 0.7, 0.2) ${i * 20}ms, opacity 0.35s ease ${i * 20}ms`;
    el.style.transform  = `translate(${dx}px, ${dy}px) scale(0.05)`;
    el.style.opacity     = '0';
  });

  // Fade toolbar buttons toward pill
  document.querySelectorAll('#add-btn, #toolbar-expand, #settings-btn, #collect-btn, #undo-btn, #btn-snap, #kofi-btn, #gb-close, #gb-pin, #gb-min').forEach(el => {
    el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.5)';
  });
  document.querySelectorAll('#empty-state, #version-label').forEach(el => {
    el.style.transition = 'opacity 0.25s ease';
    el.style.opacity = '0';
  });

  setTimeout(() => {
    document.querySelectorAll(UI_ELEMENTS).forEach(el => el.style.display = 'none');
    minimizePill.classList.add('visible');
  }, 450);
}

function restoreFromBar() {
  isMinimizedToBar = false;
  minimizePill.classList.remove('visible');

  // Reset card transforms first
  document.querySelectorAll('.card').forEach(el => {
    el.style.transition = 'none';
    el.style.transform  = 'scale(0.9)';
    el.style.opacity     = '0';
  });

  document.querySelectorAll(UI_ELEMENTS).forEach(el => {
    el.style.display = '';
  });

  // Animate cards popping back from center
  requestAnimationFrame(() => {
    document.querySelectorAll('.card').forEach((el, i) => {
      el.style.transition = `transform 0.35s cubic-bezier(0.34,1.15,0.64,1) ${i * 30}ms, opacity 0.3s ease ${i * 30}ms`;
      el.style.transform  = '';
      el.style.opacity     = '';
    });
    document.querySelectorAll('#add-btn, #toolbar-expand, #settings-btn, #collect-btn, #undo-btn, #btn-snap, #kofi-btn, #gb-close, #gb-pin, #gb-min, #empty-state, #version-label').forEach(el => {
      el.style.transition = 'opacity 0.3s ease';
      el.style.opacity = '';
      el.style.transform = '';
    });
  });
  updateEmptyState();
}

minimizePill.addEventListener('click', restoreFromBar);

// Keyboard shortcut to restore: Ctrl+Shift+F also restores if minimized
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.code === 'KeyF' && isMinimizedToBar) {
    e.preventDefault();
    restoreFromBar();
  }
});

// ── CLICK-THROUGH ─────────────────────────────────────────────
// When cursor is over a card or toolbar zone → receive mouse events.
// When over empty transparent canvas → pass through to OS (Figma, VS Code, etc).
const INTERACTIVE = [
  '.card', '.group-frame', '#add-btn', '#undo-btn', '#collect-btn', '#btn-snap',
  '#kofi-btn', '#picker', '#ctx-menu', '#fmt-toolbar', '#titlebar',
  '#toolbar-expand', '#gb-close', '#gb-pin', '#gb-min',
  '#settings-btn', '#settings-panel', '#minimize-pill', '#collect-popup', '#confirm-modal'
].join(', ');

let _lastIgnore = true;

document.addEventListener('mousemove', e => {
  if (typeof window.electronAPI === 'undefined') return;
  // Force click-through near window edges so the OS never sees a resize border
  const EDGE = 12;
  const nearEdge = e.clientX < EDGE || e.clientY < EDGE ||
                   e.clientX > window.innerWidth  - EDGE ||
                   e.clientY > window.innerHeight - EDGE;
  const hit = !nearEdge && e.composedPath().some(el => el.matches && el.matches(INTERACTIVE));
  const shouldIgnore = !hit;
  if (shouldIgnore !== _lastIgnore) {
    _lastIgnore = shouldIgnore;
    window.electronAPI.setIgnoreMouse(shouldIgnore);
  }
}, { passive: true });
</script>
