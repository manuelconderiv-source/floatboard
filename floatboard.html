  });

  item('Import cards (JSON)', () => {
    const input    = document.createElement('input');
    input.type     = 'file';
    input.accept   = '.json,application/json';
    input.addEventListener('change', () => {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported)) { alert('Invalid file — expected a JSON array.'); return; }
          pushHistory();
          // Remap ids to avoid collisions, clear snap graph for imported cards
          const idMap = {};
          imported.forEach(c => {
            const newId = uid();
            idMap[c.id] = newId;
            c.id          = newId;
            c.snapParent  = null;
            c.snapChildren = [];
            c.z            = ++zCounter;
            // Offset position so imported cards don't sit exactly on existing ones
            c.x = (c.x || 20) + 30;
            c.y = (c.y || 20) + 30;
            const clamped = clampToViewport(c.x, c.y, c.cardWidth || 260, 200);
            c.x = clamped.x; c.y = clamped.y;
            if (c.items) c.items = c.items.map(it => ({ ...it, id: uid() }));
          });
          imported.forEach(c => cards.push(c));
          renderAll();
          save();
        } catch(err) {
          alert('Failed to import: ' + err.message);
        }
      };
      reader.readAsText(file);
    });
    input.click();
  });

  ctxMenu.style.left = '0';
  ctxMenu.style.top  = '0';
  ctxMenu.classList.add('visible');
  const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
  ctxMenu.style.left = Math.min(mx, window.innerWidth  - mw - 8) + 'px';
  ctxMenu.style.top  = Math.min(my, window.innerHeight - mh - 8) + 'px';
}

// ── GROUP CONTEXT MENU ────────────────────────────────────────
function showGroupCtxMenu(groupId, mx, my) {
  const g = groups.find(gg => gg.id === groupId);
  if (!g) return;
  ctxMenu.innerHTML = '';

  function item(label, fn) {
    const d = document.createElement('div');
    d.className   = 'ctx-item';
    d.textContent = label;
    d.addEventListener('click', () => { hideCtxMenu(); fn(); });
    ctxMenu.appendChild(d);
  }
  function divider() {
    const d = document.createElement('div');
    d.className = 'ctx-divider';
    ctxMenu.appendChild(d);
  }

  function getMembers() {
    return g.memberIds.map(id => ({
      c:  cards.find(cc => cc.id === id),
      el: document.querySelector(`.card[data-id="${id}"]`)
    })).filter(m => m.c && m.el);
  }

  item('Auto stack vertical', () => {
    pushHistory();
    const members = getMembers();
    members.sort((a, b) => a.c.y - b.c.y);
    const leftX = Math.min(...members.map(m => m.c.x));
    let curY = members[0].c.y;
    members.forEach(({ c, el }) => {
      c.x = leftX; c.y = curY;
      el.style.left = leftX + 'px'; el.style.top = curY + 'px';
      curY += el.offsetHeight + SNAP_GAP;
    });
    updateGroupFrame(groupId); save();
  });

  item('Auto stack horizontal', () => {
    pushHistory();
    const members = getMembers();
    members.sort((a, b) => a.c.x - b.c.x);
    const topY = Math.min(...members.map(m => m.c.y));
    let curX = members[0].c.x;
    members.forEach(({ c, el }) => {
      c.x = curX; c.y = topY;
      el.style.left = curX + 'px'; el.style.top = topY + 'px';
      curX += el.offsetWidth + SNAP_GAP;
    });
    updateGroupFrame(groupId); save();
  });

  item('Collapse all', () => {
    pushHistory();
    getMembers().forEach(({ c, el }) => {
      if (!c.minimized) {
        c.minimized = true; el.classList.add('minimized');
        const mb = el.querySelector('.minimize-btn'); if (mb) mb.title = 'Expand';
      }
    });
    requestAnimationFrame(() => updateGroupFrame(groupId)); save();
  });

  item('Expand all', () => {
    pushHistory();
    getMembers().forEach(({ c, el }) => {
      if (c.minimized) {
        c.minimized = false; el.classList.remove('minimized');
        const mb = el.querySelector('.minimize-btn'); if (mb) mb.title = 'Minimize';
      }
    });
    requestAnimationFrame(() => { updateGroupFrame(groupId); resolveGroupOverlaps(groupId); }); save();
  });

  divider();

  item('Lock all', () => {
    pushHistory();
    getMembers().forEach(({ c, el }) => {
      c.locked = true; el.classList.add('locked');
      const li = el.querySelector('.lock-icon'); if (li) li.style.display = '';
    });
    save();
  });

  item('Unlock all', () => {
    pushHistory();
    getMembers().forEach(({ c, el }) => {
      c.locked = false; el.classList.remove('locked');
      const li = el.querySelector('.lock-icon'); if (li) li.style.display = 'none';
    });
    save();
  });

  divider();

  item('Ungroup', () => { pushHistory(); dissolveGroup(groupId); save(); });

  ctxMenu.style.left = '0'; ctxMenu.style.top = '0';
  ctxMenu.classList.add('visible');
  const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
  ctxMenu.style.left = Math.min(mx, window.innerWidth  - mw - 8) + 'px';
  ctxMenu.style.top  = Math.min(my, window.innerHeight - mh - 8) + 'px';
}

// ── GLOBAL DRAG/RESIZE SAFETY NET ────────────────────────────
// Resets stuck state if mouseup is lost to an OS dialog or out-of-window click.
window.addEventListener('mouseup', () => { isDragging = false; isResizing = false; });

// ── INIT ──────────────────────────────────────────────────────
load().then(() => {
  renderAll();           // also calls updateEmptyState()
  // After first paint: clamp positions and body heights to current viewport
  requestAnimationFrame(() => { clampAllCards(); clampBodyHeights(); });
});

// ── COLLAPSIBLE TOOLBAR ───────────────────────────────────────
const toolbarExpand = document.getElementById('toolbar-expand');

// IDs of every button that should NOT close the toolbar when clicked
const TOOLBAR_IDS = new Set([
  'toolbar-expand','btn-snap','undo-btn','collect-btn',
  'gb-close','gb-pin','gb-min'
]);

toolbarExpand.addEventListener('click', e => {
  e.stopPropagation();
  // Also close picker when opening toolbar
  picker.classList.remove('visible');
  addBtn.classList.remove('open');
  document.body.classList.toggle('toolbar-open');
  const isOpen = document.body.classList.contains('toolbar-open');
  toolbarExpand.dataset.tip = isOpen ? 'Collapse' : 'More tools';
});
document.addEventListener('click', e => {
  // Walk up the event path — if we hit a toolbar button, leave it open
  const insideToolbar = e.composedPath().some(
    el => el.id && TOOLBAR_IDS.has(el.id)
  );
  if (!insideToolbar) {
    document.body.classList.remove('toolbar-open');
    toolbarExpand.dataset.tip = 'More tools';
  }
});

// ── ELECTRON WINDOW CONTROLS ──────────────────────────────────
if (typeof window.electronAPI !== 'undefined') {
  // Transparency fix
  document.body.style.background = 'transparent';
  document.getElementById('canvas').style.background = 'transparent';

  // Enable Group B — CSS handles display once body.electron is set
  document.body.classList.add('electron');

  // Wire Group B
  document.getElementById('gb-close').addEventListener('click', e => {
    e.stopPropagation(); window.electronAPI.quit();
  });
  document.getElementById('gb-min').addEventListener('click', e => {
    e.stopPropagation(); window.electronAPI.minimize();
  });

  const gbPin     = document.getElementById('gb-pin');
  const gbPinHead = document.getElementById('gb-pin-head');
  function setPinState(p) {
    gbPin.classList.toggle('pinned', p);
    if (gbPinHead) gbPinHead.style.fill = p ? 'currentColor' : 'none';
  }
  gbPin.addEventListener('click', e => {
    e.stopPropagation(); window.electronAPI.toggleAlwaysOnTop();
  });
  setPinState(true); // starts always-on-top
  window.electronAPI.onAlwaysOnTopChanged(p => setPinState(p));

  // Wire snap — mirrors UI left↔right instantly via CSS class
  document.getElementById('btn-snap').addEventListener('click', e => {
    e.stopPropagation();
    document.body.classList.toggle('snapped-left');
  });
} else {
  // Not in Electron — tag body so CSS shifts undo/collect left
  document.body.classList.add('no-electron');
}

// ── KO-FI ──────────────────────────────────────────────────────
const KOFI_URL = 'https://ko-fi.com/manuelconde';
document.getElementById('kofi-btn').addEventListener('click', e => {
  e.stopPropagation();
  if (window.electronAPI && window.electronAPI.openExternal) {
    window.electronAPI.openExternal(KOFI_URL);
  } else {
    window.open(KOFI_URL, '_blank');
  }
});

// ── CLICK-THROUGH ─────────────────────────────────────────────
// When cursor is over a card or toolbar zone → receive mouse events.
// When over empty transparent canvas → pass through to OS (Figma, VS Code, etc).
const INTERACTIVE = [
  '.card', '.group-frame', '#add-btn', '#undo-btn', '#collect-btn', '#btn-snap',
  '#kofi-btn', '#picker', '#ctx-menu', '#fmt-toolbar', '#titlebar',
  '#toolbar-expand', '#gb-close', '#gb-pin', '#gb-min'
].join(', ');

let _lastIgnore = true;

document.addEventListener('mousemove', e => {
  if (typeof window.electronAPI === 'undefined') return;
  // Force click-through near window edges so the OS never sees a resize border
  const EDGE = 12;
  const nearEdge = e.clientX < EDGE || e.clientY < EDGE ||
                   e.clientX > window.innerWidth  - EDGE ||
                   e.clientY > window.innerHeight - EDGE;
  const hit = !nearEdge && e.composedPath().some(el => el.matches && el.matches(INTERACTIVE));
  const shouldIgnore = !hit;
  if (shouldIgnore !== _lastIgnore) {
    _lastIgnore = shouldIgnore;
    window.electronAPI.setIgnoreMouse(shouldIgnore);
  }
}, { passive: true });
</script>
