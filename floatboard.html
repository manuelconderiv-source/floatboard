        // Vertical: place A above or below B
        const ty = dy >= 0 ? cardB.y + hB + SNAP_GAP : cardB.y - hA - SNAP_GAP;
        cardA.y = ty;
        springElTo(cardA, elA, cardA.x, ty);
      }
    }
  }

  const frame = buildGroupFrame(g);
  if (frame) _insertGroupFrame(g, frame);

  showGroupRipple(cardA, cardB);
  save();
}

function addToGroup(groupId, cardData) {
  const g = groups.find(gg => gg.id === groupId);
  if (!g || g.memberIds.includes(cardData.id)) return;
  if (cardData.groupId && cardData.groupId !== groupId) leaveGroup(cardData, false);
  g.memberIds.push(cardData.id);
  cardData.groupId = groupId;
  const el = document.querySelector(`.card[data-id="${cardData.id}"]`);
  if (el) el.classList.add('in-group');
  updateGroupFrame(groupId);
  save();
}

function leaveGroup(cardData, doSave = true) {
  if (!cardData.groupId) return;
  const g = groups.find(gg => gg.id === cardData.groupId);
  if (!g) { cardData.groupId = null; return; }
  g.memberIds = g.memberIds.filter(id => id !== cardData.id);
  cardData.groupId = null;
  const lel = document.querySelector(`.card[data-id="${cardData.id}"]`);
  if (lel) lel.classList.remove('in-group');
  if (g.memberIds.length < 2) {
    dissolveGroup(g.id);
  } else {
    updateGroupFrame(g.id);
  }
  if (doSave) save();
}

function dissolveGroup(groupId) {
  const g = groups.find(gg => gg.id === groupId);
  if (!g) return;
  g.memberIds.forEach(id => {
    const c = cards.find(cc => cc.id === id);
    if (c) c.groupId = null;
    const del = document.querySelector(`.card[data-id="${id}"]`);
    if (del) del.classList.remove('in-group');
  });
  groups = groups.filter(gg => gg.id !== groupId);
  removeGroupFrameEl(groupId);
}

// ── Group frame dragging — moves all member cards together ────
function makeGroupDraggable(hdr, group) {
  hdr.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('[contenteditable="true"], button')) return;
    if (group.locked) return; // locked groups can't be dragged
    e.preventDefault(); e.stopPropagation();

    const startX = e.clientX, startY = e.clientY;
    let dragStarted = false;
    const initPos = {};
    group.memberIds.forEach(id => {
      const c = cards.find(cc => cc.id === id);
      if (c) initPos[id] = { x: c.x, y: c.y };
    });

    function getFrame() { return document.querySelector(`.group-frame[data-group-id="${group.id}"]`); }

    function onMove(e) {
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!dragStarted) {
        if (Math.sqrt(dx*dx + dy*dy) < DRAG_THRESH) return;
        dragStarted = true; isDragging = true;
        hdr.classList.add('grabbing');
        const frame = getFrame(); if (frame) frame.classList.add('group-dragging');
        zCounter++;
        group.memberIds.forEach(id => {
          const c  = cards.find(cc => cc.id === id);
          const el = document.querySelector(`.card[data-id="${id}"]`);
          if (c && el) { c.z = zCounter; el.style.zIndex = zCounter; }
        });
      }
      group.memberIds.forEach(id => {
        const c    = cards.find(cc => cc.id === id);
        const el   = document.querySelector(`.card[data-id="${id}"]`);
        const init = initPos[id];
        if (!c || !el || !init) return;
        const cl = clampToViewport(init.x + dx, init.y + dy, el.offsetWidth, el.offsetHeight);
        c.x = cl.x; c.y = cl.y;
        el.style.left = cl.x + 'px'; el.style.top = cl.y + 'px';
      });
      updateGroupFrame(group.id);
    }

    function finish() {
      if (dragStarted) {
        hdr.classList.remove('grabbing');
        const frame = getFrame(); if (frame) frame.classList.remove('group-dragging');
        isDragging = false;
        pushHistory(); save();
      }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      window.removeEventListener('blur', onBlur);
    }
    function onUp()  { finish(); }
    function onBlur() { if (dragStarted) finish(); }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    window.addEventListener('blur', onBlur);
  });
}

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  selectedCardId = null;
  document.getElementById('canvas').innerHTML = '';
  cards.forEach(c => document.getElementById('canvas').appendChild(buildCard(c)));
  renderGroupFrames(); // insert frames behind their member cards
  updateEmptyState();
}

function buildCard(data) {
  if (!data.snapParent)   data.snapParent  = null;
  if (!data.snapChildren) data.snapChildren = [];
  if (data.locked === undefined) data.locked = false;

  const el = document.createElement('div');
  el.className = 'card' + (data.minimized ? ' minimized' : '') + (data.locked ? ' locked' : '') + (data.groupId ? ' in-group' : '');
  el.dataset.id = data.id;
  el.setAttribute('role', 'article');
  el.setAttribute('aria-label', (data.title || 'untitled') + ' ' + data.type + ' card');
  const cardW = data.cardWidth || 260;
  el.style.cssText = `left:${data.x}px;top:${data.y}px;z-index:${data.z};--accent:${data.accent};--accent-rgb:${hexToRgbStr(data.accent)};--block-accent:${data.accent};width:${cardW}px`;

  const accent = document.createElement('div');
  accent.className = 'card-accent';
  accent.style.background = data.accent;
  el.appendChild(accent);


  // ── Header ──────────────────────────────────
  const header = document.createElement('div');
  header.className = 'card-header';

  const title = document.createElement('div');
  title.className   = 'card-title';
  title.textContent = data.title || 'untitled';

  function commitTitle() {
    title.removeAttribute('contenteditable');
    title.style.cursor = '';
    const val = title.textContent.trim();
    data.title = val || 'untitled';
    title.textContent = data.title;
    save();
  }
  title.addEventListener('blur', commitTitle);
  title.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
    e.stopPropagation();
  });
  title.addEventListener('mousedown', e => {
    if (title.hasAttribute('contenteditable')) e.stopPropagation();
  });

  // Lock icon (only visible when locked) — placed before title.
  // Press and hold 2 s to unlock: a conic-gradient ring animates as progress.
  const lockIcon = document.createElement('span');
  lockIcon.className = 'lock-icon';
  lockIcon.innerHTML = `<svg width="11" height="12" viewBox="0 0 11 12" fill="none" stroke="white" style="stroke:white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="5" width="8" height="6.5" rx="1.5" fill="none"/><path d="M3 5V3.5a2.5 2.5 0 0 1 5 0V5"/></svg>`;
  lockIcon.setAttribute('aria-label', 'Card locked — hold to unlock');
  lockIcon.setAttribute('role', 'button');
  lockIcon.tabIndex = data.locked ? 0 : -1;
  lockIcon.style.display = data.locked ? '' : 'none';

  lockIcon.addEventListener('mousedown', e => {
    if (!data.locked) return;
    e.stopPropagation();

    // Build overlay ring — appended to header (position:relative) so it can be absolute
    const ring = document.createElement('div');
    const iconRect   = lockIcon.getBoundingClientRect();
    const headerRect = header.getBoundingClientRect();
    const cx = iconRect.left - headerRect.left + iconRect.width  / 2;
    const cy = iconRect.top  - headerRect.top  + iconRect.height / 2;
    const r  = 13;
    ring.style.cssText = `position:absolute;width:${r*2}px;height:${r*2}px;border-radius:50%;` +
                         `left:${cx-r}px;top:${cy-r}px;pointer-events:none;z-index:20;`;
    header.appendChild(ring);

    const DURATION  = 500;
    const startTime = performance.now();
    let rafId;

    function animateRing(now) {
      const progress = Math.min((now - startTime) / DURATION, 1);
      const deg = Math.round(progress * 360);
      ring.style.background =
        `conic-gradient(rgba(255,255,255,0.75) ${deg}deg, rgba(255,255,255,0.12) ${deg}deg)`;
      if (progress < 1) {
        rafId = requestAnimationFrame(animateRing);
      } else {
        ring.remove();
        setLocked(data, el, false);
      }
    }
    rafId = requestAnimationFrame(animateRing);

    function cancel() {
      cancelAnimationFrame(rafId);
      ring.remove();
      document.removeEventListener('mouseup',    cancel);
      lockIcon.removeEventListener('mouseleave', cancel);
    }
    document.addEventListener('mouseup',    cancel, { once: true });
    lockIcon.addEventListener('mouseleave', cancel, { once: true });
  });

  // Double-click header to rename (replaces pencil button)
  header.addEventListener('dblclick', e => {
    if (data.locked) return;
    if (e.target.closest('button')) return;
    title.setAttribute('contenteditable', 'true');
    title.style.cursor = 'text';
    title.focus();
    const sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(title);
    sel.removeAllRanges(); sel.addRange(range);
  });

  const minBtn = document.createElement('button');
  minBtn.className = 'card-btn minimize-btn';
  minBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M2 7.5l4-3 4 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  minBtn.title = data.minimized ? 'Expand' : 'Minimize';
  minBtn.setAttribute('aria-label', data.minimized ? 'Expand card' : 'Minimize card');
  minBtn.setAttribute('aria-expanded', !data.minimized);
  minBtn.addEventListener('mousedown', e => e.stopPropagation());
  minBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushHistory();
    data.minimized = !data.minimized;
    el.classList.toggle('minimized', data.minimized);
    // Clear/restore inline body height so CSS can take over
    const bodyEl = el.querySelector('.card-body');
    if (bodyEl) {
      if (data.minimized) {
        bodyEl.style.height = '0';
        bodyEl.style.flex = '0';
      } else {
        if (data.bodyHeight) {
          bodyEl.style.height = data.bodyHeight + 'px';
          bodyEl.style.flex = 'none';
        } else {
          bodyEl.style.height = '';
          bodyEl.style.flex = '';
        }
      }
    }
    minBtn.title = data.minimized ? 'Expand' : 'Minimize';
    minBtn.setAttribute('aria-label', data.minimized ? 'Expand card' : 'Minimize card');
    minBtn.setAttribute('aria-expanded', !data.minimized);
    save();
    requestAnimationFrame(() => {
      cascadeReflow(data.id, new Set(), true);
      if (data.groupId) resolveGroupOverlaps(data.groupId);
    });
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'card-btn delete-btn';
  delBtn.title     = 'Delete card';
  delBtn.setAttribute('aria-label', 'Delete card');
  delBtn.innerHTML = '×'; delBtn.style.fontSize = '17px';
  delBtn.addEventListener('mousedown', e => e.stopPropagation());
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteCard(data, el);
  });

  header.appendChild(lockIcon);
  header.appendChild(title);
  header.appendChild(minBtn);
  header.appendChild(delBtn);
  el.appendChild(header);

  // ── Body ────────────────────────────────────
  const body = document.createElement('div');
  body.className = 'card-body';
  if (data.minimized) {
    body.style.flex = '0';
    body.style.height = '0';
  } else if (data.bodyHeight && data.type !== 'image') {
    body.style.flex   = 'none';
    body.style.height = data.bodyHeight + 'px';
  }

  if      (data.type === 'todo')      buildTodoBody(body, data);
  else if (data.type === 'text')      buildTextBody(body, data);
  else if (data.type === 'image')     buildImageBody(body, data);
  else if (data.type === 'usage')     buildUsageBody(body, data);
  else if (data.type === 'schedule')  buildScheduleBody(body, data);
  else if (data.type === 'pomodoro')  buildPomodoroBody(body, data);
  else if (data.type === 'stopwatch') buildStopwatchBody(body, data);
  else if (data.type === 'countdown') buildCountdownBody(body, data);
  else if (data.type === 'habits')    buildHabitsBody(body, data);

  el.appendChild(body);

  // Apply persisted opacity (premium feature)
  if (data.opacity !== undefined && data.opacity !== null && data.opacity !== 1) {
    el.style.opacity = data.opacity;
  }

  // ── Resize handles ───────────────────────────
  if (data.type === 'image') {
    const ch = document.createElement('div');
    ch.className = 'card-corner-resize';
    el.appendChild(ch);
    makeCornerResizable(ch, el, data);
  } else {
    const rh = document.createElement('div');
    rh.className = 'card-resize-handle';
    el.appendChild(rh);
    makeResizable(rh, body, data);

    const ew = document.createElement('div');
    ew.className = 'card-edge-resize';
    el.appendChild(ew);
    makeWidthResizable(ew, el, data);
  }

  makeDraggable(el, header, data);

  // Capture-phase mousedown: bring card forward and select it BEFORE any child handler runs.
  el.addEventListener('mousedown', () => {
    bringToFront(el, data);
    if (selectedCardId !== data.id) {
      if (selectedCardId) {
        const prev = document.querySelector(`.card[data-id="${selectedCardId}"]`);
        if (prev) prev.classList.remove('selected');
      }
      selectedCardId = data.id;
      el.classList.add('selected');
    }
  }, true);

  // Right-click context menu
  el.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e.clientX, e.clientY, data, el); });

  return el;
}

// ── DELETE CARD (shared by del button and context menu) ───────
function deleteCard(data, el) {
  pushHistory();
  if (data.groupId) leaveGroup(data, false); // remove from group before deleting
  const parentRef = data.snapParent;
  const parent    = parentRef ? cards.find(c => c.id === parentRef.id) : null;
  if (parent) parent.snapChildren = parent.snapChildren.filter(ch => ch.id !== data.id);
  for (const { id: childId, edge } of (data.snapChildren || [])) {
    const child = cards.find(c => c.id === childId);
    if (!child) continue;
    if (parent) { child.snapParent = { id: parent.id, edge }; parent.snapChildren.push({ id: childId, edge }); }
    else        { child.snapParent = null; }
  }
  if (data._springRaf) { cancelAnimationFrame(data._springRaf); data._springRaf = null; }
  data.snapParent = null; data.snapChildren = [];
  cards = cards.filter(c => c.id !== data.id);
  // Animate out then remove
  el.classList.add('deleting');
  el.addEventListener('animationend', () => el.remove(), { once: true });
  if (parent) cascadeReflow(parent.id, new Set(), true);
  updateEmptyState();
  save();
}

// ── TODO ──────────────────────────────────────────────────────
function buildTodoBody(body, data) {
  if (!data.items) data.items = [];
  const list = document.createElement('ul');
  list.className = 'todo-list';
  list.setAttribute('role', 'list');
  list.setAttribute('aria-label', 'Todo items');
  let dragSrcIdx = null;

  function rebuildList() {
    list.innerHTML = '';
    data.items.forEach((item, idx) => list.appendChild(makeTodoItem(item, idx)));
  }

  function makeTodoItem(item, idx) {
    const li = document.createElement('li');
    li.className  = 'todo-item' + (item.done ? ' done' : '');
    li.draggable  = true;

    li.addEventListener('dragstart', e => {
      dragSrcIdx = idx; e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => li.style.opacity = '0.4', 0);
    });
    li.addEventListener('dragend',  () => li.style.opacity = '');
    li.addEventListener('dragover', e => {
      e.preventDefault();
      list.querySelectorAll('.todo-item').forEach(i => i.classList.remove('drag-over'));
      li.classList.add('drag-over');
    });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => {
      e.preventDefault(); li.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      pushHistory(); touchLastEdited(data.id);
      const moved = data.items.splice(dragSrcIdx, 1)[0];
      data.items.splice(idx, 0, moved);
      dragSrcIdx = null; save(); rebuildList();
    });

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.innerHTML = `<svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor"><circle cx="3" cy="3" r="1.2"/><circle cx="7" cy="3" r="1.2"/><circle cx="3" cy="7" r="1.2"/><circle cx="7" cy="7" r="1.2"/><circle cx="3" cy="11" r="1.2"/><circle cx="7" cy="11" r="1.2"/></svg>`;
    handle.addEventListener('mousedown', e => e.stopPropagation());

    const cb = document.createElement('div');
    cb.className = 'todo-checkbox' + (item.done ? ' checked' : '');
    cb.setAttribute('role', 'checkbox');
    cb.setAttribute('aria-checked', item.done);
    cb.setAttribute('aria-label', 'Mark task ' + (item.done ? 'incomplete' : 'complete'));
    cb.tabIndex = 0;
    cb.addEventListener('mousedown', e => e.stopPropagation());
    cb.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cb.click(); } });
    cb.addEventListener('click', e => {
      e.stopPropagation();
      pushHistory(); touchLastEdited(data.id);
      item.done = !item.done;
      li.classList.toggle('done', item.done);
      cb.classList.toggle('checked', item.done);
      cb.setAttribute('aria-checked', item.done);
      cb.setAttribute('aria-label', 'Mark task ' + (item.done ? 'incomplete' : 'complete'));
      // Bounce animation
      cb.classList.remove('checking');
      void cb.offsetWidth; // force reflow to restart animation
      cb.classList.add('checking');
      cb.addEventListener('animationend', () => cb.classList.remove('checking'), { once: true });
      save();
    });

    const txt = document.createElement('div');
    txt.className       = 'todo-text';
    txt.contentEditable = 'true'; txt.spellcheck = false;
    txt.textContent     = item.text;
    txt.addEventListener('mousedown', e => e.stopPropagation());

    // 1500 ms debounce: one history snapshot per typing burst
    let txtHistTimer = null;
    txt.addEventListener('input', () => {
      clearTimeout(txtHistTimer);
      txtHistTimer = setTimeout(() => pushHistory(), 1500);
      touchLastEdited(data.id);
      item.text = txt.textContent;
      scheduleSave();
    });
    txt.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addInput.focus(); }
    });

    const del = document.createElement('button');
    del.className = 'todo-delete'; del.innerHTML = '×';
    del.setAttribute('aria-label', 'Delete todo item');
    del.addEventListener('mousedown', e => e.stopPropagation());
    del.addEventListener('click', e => {
      e.stopPropagation();
      pushHistory(); touchLastEdited(data.id);
      data.items.splice(idx, 1); save(); rebuildList();
    });

    li.appendChild(handle); li.appendChild(cb); li.appendChild(txt); li.appendChild(del);
    return li;
  }

  rebuildList();

  const addRow   = document.createElement('div');
  addRow.className = 'todo-add-row';
  const plusIcon = document.createElement('span');
  plusIcon.style.cssText  = 'font-size:14px;color:rgba(255,255,255,0.35);flex-shrink:0;line-height:1';
  plusIcon.textContent    = '+';
  const addInput = document.createElement('input');
  addInput.className   = 'todo-add-input';
  addInput.type        = 'text';
  addInput.setAttribute('aria-label', 'Add new todo item');
  addInput.placeholder = 'Add item…';
  addInput.addEventListener('mousedown', e => e.stopPropagation());
  addInput.addEventListener('focus', () => addRow.style.opacity = '1');
  addInput.addEventListener('blur',  () => addRow.style.opacity = '');
  addInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = addInput.value.trim(); if (!val) return;
      pushHistory(); touchLastEdited(data.id);
      data.items.push({ id: uid(), text: val, done: false });
      addInput.value = ''; save(); rebuildList();
    }
  });

  addRow.appendChild(plusIcon); addRow.appendChild(addInput);
  body.appendChild(list); body.appendChild(addRow);
}

// ── TEXT ──────────────────────────────────────────────────────
function buildTextBody(body, data) {
  const content = document.createElement('div');
  content.className       = 'text-content';
  content.contentEditable = 'true'; content.spellcheck = false;
  content.dataset.placeholder = 'Start typing…';
  content.setAttribute('role', 'textbox');
  content.setAttribute('aria-multiline', 'true');
  content.setAttribute('aria-label', 'Note text content');
  if (data.content) content.innerHTML = data.content;
  content.addEventListener('mousedown', e => e.stopPropagation());

  // 1500 ms debounce. Ctrl+Z uses native browser undo inside contenteditable.
  let textHistTimer = null;
  content.addEventListener('input', () => {
    clearTimeout(textHistTimer);
    textHistTimer = setTimeout(() => pushHistory(), 1500);
    touchLastEdited(data.id);
    data.content = content.innerHTML;
    scheduleSave();
  });

  // Selection handling is done via global mouseup (see format toolbar section)

  body.appendChild(content);
}

// ── IMAGE ─────────────────────────────────────────────────────
function buildImageBody(body, data) {
  const zone      = document.createElement('div');
  zone.className  = 'image-zone';
  zone.setAttribute('role', 'button');
  zone.setAttribute('aria-label', 'Click to upload image');
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = 'image/*';
  fileInput.setAttribute('aria-label', 'Upload image file');
  fileInput.addEventListener('mousedown', e => e.stopPropagation());

  function renderZone() {
    zone.innerHTML = '';
    if (data.imageData) {
      const img  = document.createElement('img');
      img.src    = data.imageData;
      img.onload = () => { if (!data.imageAspectRatio) data.imageAspectRatio = img.naturalWidth / img.naturalHeight; };
      zone.appendChild(img);
    } else {
      const hint = document.createElement('div');
      hint.className = 'upload-hint';
      hint.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Click to upload</span>`;
      zone.appendChild(hint);
    }
    zone.appendChild(fileInput);
  }

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > MAX || h > MAX) {
          const ratio = Math.min(MAX / w, MAX / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.82);
        data.imageData = compressed;
        data.imageAspectRatio = w / h;
        try {
          save();
        } catch(e) {
          // localStorage quota exceeded — store in memory only
          console.warn('Storage full, image not persisted', e);
        }
        renderZone();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  zone.addEventListener('click', e => { if (e.target !== fileInput) fileInput.click(); });
  renderZone();
  body.appendChild(zone);
}

// ── SCHEDULE CARD BODY ───────────────────────────────────────

function normalizeTime(raw) {
  if (!raw) return '';
  let s = raw.trim().toLowerCase();
  const pm = s.includes('pm');
  const am = s.includes('am');
  s = s.replace(/\s*(am|pm)/i, '');
  let [h, m] = s.split(':').map(Number);
  if (isNaN(h)) return '';
  if (isNaN(m)) m = 0;
  if (pm && h < 12) h += 12;
  if (am && h === 12) h = 0;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

// Detect if a line is a section header (MORNING, AFTERNOON, etc.)
function isSectionHeader(line) {
  const clean = line.trim();
  if (!clean || clean.length > 40) return false;
  // All-caps words, optionally with —, -, :, or emoji
  if (/^[A-Z][A-Z\s\-–—:&]+$/.test(clean)) return true;
  // Mixed case section labels like "Mid-Morning — DGO"
  if (/^[A-Za-z][\w\s\-–—:&]+$/.test(clean) && !/\d/.test(clean) && clean.length < 30) return true;
  return false;
}

// Parse a line into a time + task, or return null
function parseScheduleLine(line) {
  const clean = line.trim();
  if (!clean) return null;

  // Check for section header first
  if (isSectionHeader(clean)) {
    return { id: uid(), type: 'section', text: clean };
  }

  // Remove leading bullets/numbers: "- ", "• ", "1. ", "1) "
  const stripped = clean.replace(/^[-•*]\s+/, '').replace(/^\d+[.)]\s+/, '');

  // Try to match a time at the start
  // Formats: 9:00, 09:00, 9am, 9:00am, 9:00 AM
  const timeMatch = stripped.match(/^(\d{1,2}(?::\d{2})?\s*(?:am|pm)?)/i);
  if (!timeMatch) return null;

  const timeStr = timeMatch[1];
  const rest = stripped.slice(timeMatch[0].length);
  // Strip any separators between time and task text
  const text = rest.replace(/^[\s\-–—:,]+/, '').trim();
  if (!text) return null;

  return {
    id: uid(),
    type: 'task',
    time: normalizeTime(timeStr),
    text
  };
}

// Parse a full schedule text block into items array
function parseScheduleText(text) {
  // Split on newlines (handle \r\n, \n, \r, and Unicode line separators)
  const lines = text.split(/\r?\n|\r|\u2028|\u2029/).map(l => l.trim()).filter(Boolean);
  const items = [];
  lines.forEach(line => {
    const parsed = parseScheduleLine(line);
    if (parsed) items.push(parsed);
  });
  return items;
}

// ── TIMELINE HELPERS ─────────────────────────────────────────

function timeToMinutes(t) {
  if (!t) return -1;
  const [h, m] = t.split(':').map(Number);
  return isNaN(h) ? -1 : h * 60 + (m || 0);
}

function minutesToTime(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function computeVisibleRanges(items, pxPerMin) {
  const intervals = items
    .filter(i => i.time && timeToMinutes(i.time) >= 0)
    .map(i => ({ s: timeToMinutes(i.time), e: timeToMinutes(i.time) + (i.duration || 60) }))
    .sort((a, b) => a.s - b.s);

  if (intervals.length === 0) return { segments: [], gaps: [], totalHeight: 0 };

  // Merge into clusters (gap ≤ 120min = same cluster)
  const clusters = [{ s: intervals[0].s, e: intervals[0].e }];
  for (let i = 1; i < intervals.length; i++) {
    const last = clusters[clusters.length - 1];
    if (intervals[i].s - last.e <= 120) {
      last.e = Math.max(last.e, intervals[i].e);
    } else {
      clusters.push({ s: intervals[i].s, e: intervals[i].e });
    }
  }

  // Pad ±60min, clamp [0, 1440], snap to whole hour
  clusters.forEach(c => {
    c.s = Math.max(0, Math.floor((c.s - 60) / 60) * 60);
    c.e = Math.min(1440, Math.ceil((c.e + 60) / 60) * 60);
  });

  // Build segments with y-offsets
  const GAP_H = 20;
  const segments = [];
  let yOffset = 0;
  clusters.forEach((c, i) => {
    const height = (c.e - c.s) * pxPerMin;
    segments.push({ startMin: c.s, endMin: c.e, yOffset, height });
    yOffset += height;
    if (i < clusters.length - 1) yOffset += GAP_H;
  });

  return { segments, gaps: clusters.length > 1, totalHeight: yOffset };
}

function minToY(min, segments) {
  for (const seg of segments) {
    if (min >= seg.startMin && min <= seg.endMin) {
      return seg.yOffset + (min - seg.startMin) * (seg.height / (seg.endMin - seg.startMin));
    }
  }
  // Before first or after last — clamp
  if (segments.length > 0) {
    if (min < segments[0].startMin) return 0;
    const last = segments[segments.length - 1];
    return last.yOffset + last.height;
  }
  return 0;
}

// Determine section label for a time string
function getTimeSection(timeStr) {
  if (!timeStr) return null;
  const h = parseInt(timeStr.split(':')[0], 10);
  if (isNaN(h)) return null;
  if (h < 12) return 'MORNING';
  if (h < 18) return 'AFTERNOON';
  return 'EVENING';
}

function formatTime(time24, use12h) {
  if (!time24 || !use12h) return time24 || '';
  const [h, m] = time24.split(':').map(Number);
  if (isNaN(h)) return time24;
  const period = h >= 12 ? 'pm' : 'am';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return h12 + ':' + String(m).padStart(2, '0') + period;
}

function buildScheduleBody(body, data) {
  if (!data.items) data.items = [];
  if (data.use12h === undefined) data.use12h = false;
  if (!data.pxPerHour) data.pxPerHour = 60;
  // Migrate: add duration, filter out section items
  data.items = data.items.filter(i => i.type !== 'section');
  data.items.forEach(item => {
    if (!item.type) item.type = 'task';
    if (item.done === undefined) item.done = false;
    if (!item.duration) item.duration = 60;
  });

  body.classList.add('tl-body');
  const PX_PER_MIN = data.pxPerHour / 60;
  const SNAP = 15; // snap to 15-minute intervals

  function celebrate(el) {
    const rect = el.getBoundingClientRect();
    const burst = document.createElement('div');
    burst.className = 'schedule-celebrate';
    burst.style.left = (rect.left + rect.width / 2 - 10) + 'px';
    burst.style.top  = (rect.top + rect.height / 2 - 10) + 'px';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 500);
  }

  // ── TOOLBAR (add input + format toggle) ──
  const toolbar = document.createElement('div');
  toolbar.className = 'tl-toolbar';
  const addInput = document.createElement('input');
  addInput.className = 'schedule-add-input';
  addInput.type = 'text';
  addInput.placeholder = 'Paste schedule or type "9:00 task"…';
  addInput.setAttribute('aria-label', 'Add schedule item');
  addInput.addEventListener('mousedown', e => e.stopPropagation());
  const fmtBtn = document.createElement('button');
  fmtBtn.className = 'schedule-fmt-toggle';
  fmtBtn.textContent = data.use12h ? '12h' : '24h';
  fmtBtn.addEventListener('mousedown', e => e.stopPropagation());
  fmtBtn.addEventListener('click', () => {
    data.use12h = !data.use12h;
    fmtBtn.textContent = data.use12h ? '12h' : '24h';
    save(); renderTimeline();
  });
  toolbar.appendChild(addInput);
  toolbar.appendChild(fmtBtn);

  // ── CONTAINER ──
  const container = document.createElement('div');
  container.className = 'tl-container';
  const ghostLine = document.createElement('div');
  ghostLine.className = 'tl-drag-ghost';
  container.appendChild(ghostLine);

  // ── COMPLETED ──
  const completedToggle = document.createElement('div');
  completedToggle.className = 'schedule-completed-toggle';
  completedToggle.innerHTML = '<svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><path d="M2 0l4 4-4 4z"/></svg> <span>Completed <span class="sct-count">0</span></span>';
  completedToggle.style.display = 'none';
  completedToggle.addEventListener('click', () => {
    completedToggle.classList.toggle('open');
    completedDiv.classList.toggle('open');
  });
  const completedDiv = document.createElement('div');
  completedDiv.className = 'schedule-completed-list';

  // ── RENDER TIMELINE ──
  function renderTimeline() {
    // Clear previous
    container.innerHTML = '';
    container.appendChild(ghostLine);
    completedDiv.innerHTML = '';

    const active = data.items.filter(i => !i.done && timeToMinutes(i.time) >= 0);
    const noTime = data.items.filter(i => !i.done && timeToMinutes(i.time) < 0);
    const completed = data.items.filter(i => i.done);

    if (active.length === 0 && noTime.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'tl-empty';
      empty.textContent = 'Paste a schedule or add a task';
      container.appendChild(empty);
    }

    if (active.length > 0) {
      const ranges = computeVisibleRanges(active, PX_PER_MIN);
      container.style.height = ranges.totalHeight + 'px';

      // Gutter + gridlines
      const gutter = document.createElement('div');
      gutter.className = 'tl-gutter';
      const track = document.createElement('div');
      track.className = 'tl-track';

      ranges.segments.forEach((seg, segIdx) => {
        // Hour labels and gridlines for this segment
        const firstHour = Math.ceil(seg.startMin / 60);
        const lastHour  = Math.floor(seg.endMin / 60);
        for (let h = firstHour; h <= lastHour; h++) {
          const y = seg.yOffset + (h * 60 - seg.startMin) * PX_PER_MIN;
          // Hour label
          const label = document.createElement('div');
          label.className = 'tl-hour-label';
          label.style.top = y + 'px';
          label.textContent = formatTime(String(h).padStart(2, '0') + ':00', data.use12h);
          gutter.appendChild(label);
          // Gridline
          const line = document.createElement('div');
          line.className = 'tl-hour-line';
          line.style.top = y + 'px';
          container.appendChild(line);
        }

        // Gap divider after segment (except last)
        if (segIdx < ranges.segments.length - 1) {
          const gap = document.createElement('div');
          gap.className = 'tl-gap';
          gap.style.top = (seg.yOffset + seg.height) + 'px';
          const dots = document.createElement('span');
          dots.className = 'tl-gap-dots';
          dots.textContent = '···';
          gap.appendChild(dots);
          container.appendChild(gap);
        }
      });

      container.appendChild(gutter);
      container.appendChild(track);

      // Task blocks
      active.sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
      active.forEach(item => {
        const startMin = timeToMinutes(item.time);
        const y = minToY(startMin, ranges.segments);
        const h = (item.duration || 60) * PX_PER_MIN;

        const block = document.createElement('div');
        block.className = 'tl-block' + (item.done ? ' tl-done' : '');
        block.style.top    = y + 'px';
        block.style.height = Math.max(20, h) + 'px';

        // Time label
        const timeLabel = document.createElement('div');
        timeLabel.className = 'tl-block-time';
        const endTime = minutesToTime(startMin + (item.duration || 60));
        timeLabel.textContent = formatTime(item.time, data.use12h) + ' – ' + formatTime(endTime, data.use12h);

        // Text
        const txt = document.createElement('div');
        txt.className = 'tl-block-text';
        txt.contentEditable = 'true';
        txt.spellcheck = false;
        txt.textContent = item.text || '';
        let txtTimer;
        txt.addEventListener('mousedown', e => e.stopPropagation());
        txt.addEventListener('input', () => {
          clearTimeout(txtTimer);
          txtTimer = setTimeout(() => pushHistory(), 1500);
          touchLastEdited(data.id);
          item.text = txt.textContent;
          scheduleSave();
        });

        // Checkbox
        const cb = document.createElement('div');
        cb.className = 'schedule-check' + (item.done ? ' checked' : '');
        cb.addEventListener('mousedown', e => e.stopPropagation());
        cb.addEventListener('click', e => {
          e.stopPropagation();
          pushHistory(); item.done = !item.done;
          if (item.done) celebrate(cb);
          save(); renderTimeline();
        });

        // Delete
        const del = document.createElement('button');
        del.className = 'schedule-delete';
        del.innerHTML = '×';
        del.addEventListener('mousedown', e => e.stopPropagation());
        del.addEventListener('click', e => {
          e.stopPropagation(); pushHistory();
          data.items.splice(data.items.indexOf(item), 1);
          save(); renderTimeline();
        });

        // Resize handle
        const resizeH = document.createElement('div');
        resizeH.className = 'tl-block-resize';
        resizeH.addEventListener('mousedown', e => {
          e.preventDefault(); e.stopPropagation();
          const startY = e.clientY, startDur = item.duration || 60;
          function onMove(ev) {
            const deltaPx = ev.clientY - startY;
            const deltaMins = Math.round(deltaPx / PX_PER_MIN / SNAP) * SNAP;
            const newDur = Math.max(15, Math.min(480, startDur + deltaMins));
            item.duration = newDur;
            block.style.height = Math.max(20, newDur * PX_PER_MIN) + 'px';
            const newEnd = minutesToTime(startMin + newDur);
            timeLabel.textContent = formatTime(item.time, data.use12h) + ' – ' + formatTime(newEnd, data.use12h);
          }
          function onUp() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            pushHistory(); save(); renderTimeline();
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        // Drag to reschedule
        block.addEventListener('mousedown', e => {
          if (e.target.closest('.tl-block-text, .schedule-check, .schedule-delete, .tl-block-resize')) return;
          e.preventDefault(); e.stopPropagation();
          block.classList.add('tl-dragging');
          ghostLine.style.display = 'block';
          ghostLine.style.background = data.accent;
          const startY = e.clientY, origMin = startMin;

          function onMove(ev) {
            const deltaPx = ev.clientY - startY;
            const deltaMins = Math.round(deltaPx / PX_PER_MIN / SNAP) * SNAP;
            const newMin = Math.max(0, Math.min(1380, origMin + deltaMins));
            const newY = minToY(newMin, ranges.segments);
            block.style.top = newY + 'px';
            ghostLine.style.top = newY + 'px';
            ghostLine._snapMin = newMin;
          }
          function onUp() {
            block.classList.remove('tl-dragging');
            ghostLine.style.display = 'none';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            if (ghostLine._snapMin !== undefined) {
              item.time = minutesToTime(ghostLine._snapMin);
              delete ghostLine._snapMin;
            }
            pushHistory(); save(); renderTimeline();
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        block.appendChild(timeLabel);
        block.appendChild(txt);
        block.appendChild(cb);
        block.appendChild(del);
        block.appendChild(resizeH);
        track.appendChild(block);
      });
    }

    // Completed accordion
    if (completed.length > 0) {
      completedToggle.style.display = '';
      completedToggle.querySelector('.sct-count').textContent = completed.length;
      completed.forEach(item => {
        const row = document.createElement('div');
        row.className = 'schedule-completed-item';
        const cb = document.createElement('div');
        cb.className = 'schedule-check checked';
        cb.style.cssText = 'width:12px;height:12px;border-radius:3px;cursor:pointer;flex-shrink:0';
        cb.addEventListener('click', () => {
          pushHistory(); item.done = false; save(); renderTimeline();
        });
        const label = document.createElement('span');
        label.textContent = (item.time ? formatTime(item.time, data.use12h) + ' ' : '') + (item.text || '');
        row.appendChild(cb); row.appendChild(label);
        completedDiv.appendChild(row);
      });
    } else {
      completedToggle.style.display = 'none';
      completedDiv.classList.remove('open');
      completedToggle.classList.remove('open');
    }
  }

  // ── ADD INPUT ──
  addInput.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = addInput.value.trim();
    if (!val) return;
    pushHistory(); touchLastEdited(data.id);
    const parsed = parseScheduleLine(val);
    if (parsed && parsed.type === 'task') {
      parsed.done = false; parsed.duration = parsed.duration || 60;
      data.items.push(parsed);
    } else {
      // Auto-assign current time rounded to next 15min
      const now = new Date();
      const mins = Math.ceil((now.getHours() * 60 + now.getMinutes()) / 15) * 15;
      data.items.push({ id: uid(), type: 'task', time: minutesToTime(mins), duration: 60, done: false, text: val });
    }
    addInput.value = ''; save(); renderTimeline();
  });

  // ── PASTE ──
  addInput.addEventListener('paste', e => {
    let text = '';
    try {
      const cd = e.clipboardData || window.clipboardData;
      text = cd.getData('text/plain') || cd.getData('Text') || cd.getData('text') || '';
    } catch(_) {}
    if (!text || !text.includes('\n')) return;
    e.preventDefault();
    const parsed = parseScheduleText(text).filter(i => i.type === 'task');
    if (parsed.length === 0) return;
    // Infer durations from gaps
    parsed.sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
    for (let i = 0; i < parsed.length - 1; i++) {
      const gap = timeToMinutes(parsed[i + 1].time) - timeToMinutes(parsed[i].time);
      parsed[i].duration = (gap > 0 && gap <= 180) ? gap : 60;
    }
    if (parsed.length > 0) parsed[parsed.length - 1].duration = 60;
    parsed.forEach(p => { p.done = false; });
    pushHistory(); touchLastEdited(data.id);
    parsed.forEach(p => data.items.push(p));
    addInput.value = ''; save(); renderTimeline();
  });

  renderTimeline();

  body.appendChild(toolbar);
  body.appendChild(container);
  body.appendChild(completedToggle);
  body.appendChild(completedDiv);
}

// ── STOPWATCH CARD BODY ─────────────────────────────────────
function buildStopwatchBody(body, data) {
  if (!data.laps) data.laps = [];
  body.classList.add('stopwatch-body');

  const wrap = document.createElement('div');
  wrap.className = 'stopwatch-wrap';

  // Display
  const display = document.createElement('div');
  display.className = 'stopwatch-display';
  display.innerHTML = '00:00<span class="stopwatch-ms">.00</span>';

  // Controls
  const controls = document.createElement('div');
  controls.className = 'stopwatch-controls';

  const startBtn = document.createElement('button');
  startBtn.className = 'stopwatch-btn';
  startBtn.textContent = 'Start';

  const lapBtn = document.createElement('button');
  lapBtn.className = 'stopwatch-btn';
  lapBtn.textContent = 'Lap';
  lapBtn.disabled = true;
  lapBtn.style.opacity = '0.4';

  const resetBtn = document.createElement('button');
  resetBtn.className = 'stopwatch-btn';
  resetBtn.textContent = 'Reset';

  controls.appendChild(startBtn);
  controls.appendChild(lapBtn);
  controls.appendChild(resetBtn);

  // Laps list
  const lapList = document.createElement('div');
  lapList.className = 'stopwatch-laps';

  wrap.appendChild(display);
  wrap.appendChild(controls);
  wrap.appendChild(lapList);
  body.appendChild(wrap);

  let running = false;
  let elapsed = 0;
  let startTime = 0;
  let rafId = null;

  function fmtTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
    const sec = String(totalSec % 60).padStart(2, '0');
    const cs = String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
    return { min, sec, cs };
  }

  function updateDisplay() {
    const now = running ? elapsed + (performance.now() - startTime) : elapsed;
    const t = fmtTime(now);
    display.innerHTML = `${t.min}:${t.sec}<span class="stopwatch-ms">.${t.cs}</span>`;
    if (running) rafId = requestAnimationFrame(updateDisplay);
  }

  function renderLaps() {
    lapList.innerHTML = '';
    for (let i = data.laps.length - 1; i >= 0; i--) {
      const lap = document.createElement('div');
      lap.className = 'stopwatch-lap';
      const diff = i > 0 ? data.laps[i] - data.laps[i - 1] : data.laps[i];
      const t = fmtTime(data.laps[i]);
      const d = fmtTime(diff);
      lap.innerHTML = `<span class="stopwatch-lap-num">#${i + 1}</span><span class="stopwatch-lap-time">${t.min}:${t.sec}.${t.cs}</span><span class="stopwatch-lap-diff">+${d.min}:${d.sec}.${d.cs}</span>`;
      lapList.appendChild(lap);
    }
  }

  startBtn.addEventListener('click', () => {
    if (!running) {
      running = true;
      startTime = performance.now();
      startBtn.textContent = 'Stop';
      startBtn.classList.add('active');
      lapBtn.disabled = false;
      lapBtn.style.opacity = '1';
      updateDisplay();
    } else {
      running = false;
      elapsed += performance.now() - startTime;
      if (rafId) cancelAnimationFrame(rafId);
      startBtn.textContent = 'Start';
      startBtn.classList.remove('active');
      lapBtn.disabled = true;
      lapBtn.style.opacity = '0.4';
      updateDisplay();
    }
  });

  lapBtn.addEventListener('click', () => {
    if (!running) return;
    const now = elapsed + (performance.now() - startTime);
    data.laps.push(Math.round(now));
    save();
    renderLaps();
  });

  resetBtn.addEventListener('click', () => {
    running = false;
    elapsed = 0;
    if (rafId) cancelAnimationFrame(rafId);
    data.laps = [];
    save();
    startBtn.textContent = 'Start';
    startBtn.classList.remove('active');
    lapBtn.disabled = true;
    lapBtn.style.opacity = '0.4';
    display.innerHTML = '00:00<span class="stopwatch-ms">.00</span>';
    lapList.innerHTML = '';
  });

  renderLaps();
}

// ── COUNTDOWN CARD BODY ─────────────────────────────────────
function buildCountdownBody(body, data) {
  if (!data.createdDate) data.createdDate = new Date().toISOString();
  if (!data.countdownLabel) data.countdownLabel = 'countdown';
  body.classList.add('countdown-body');

  const wrap = document.createElement('div');
  wrap.className = 'countdown-wrap';

  // Label input
  const labelInput = document.createElement('input');
  labelInput.className = 'countdown-label-input';
  labelInput.type = 'text';
  labelInput.value = data.countdownLabel;
  labelInput.placeholder = 'event name';
  labelInput.addEventListener('input', () => {
    data.countdownLabel = labelInput.value;
    save();
  });
  labelInput.addEventListener('keydown', e => e.stopPropagation());

  // Date input
  const dateInput = document.createElement('input');
  dateInput.className = 'countdown-date-input';
  dateInput.type = 'date';
  if (data.targetDate) dateInput.value = data.targetDate;

  // Display
  const displayEl = document.createElement('div');
  displayEl.className = 'countdown-display';
  displayEl.textContent = 'Set a date';

  const subDisplay = document.createElement('div');
  subDisplay.className = 'countdown-display-small';

  // Progress bar
  const progressWrap = document.createElement('div');
  progressWrap.className = 'countdown-progress';
  const progressFill = document.createElement('div');
  progressFill.className = 'countdown-progress-fill';
  progressWrap.appendChild(progressFill);

  wrap.appendChild(labelInput);
  wrap.appendChild(dateInput);
  wrap.appendChild(displayEl);
  wrap.appendChild(subDisplay);
  wrap.appendChild(progressWrap);
  body.appendChild(wrap);

  let intervalId = null;

  function updateCountdown() {
    if (!data.targetDate) {
      displayEl.textContent = 'Set a date';
      displayEl.className = 'countdown-display';
      subDisplay.textContent = '';
      progressFill.style.width = '0%';
      return;
    }
    const now = new Date();
    const target = new Date(data.targetDate + 'T00:00:00');
    const created = new Date(data.createdDate);
    const diffMs = target.getTime() - now.getTime();
    const totalMs = target.getTime() - created.getTime();

    if (diffMs > 0) {
      const days = Math.floor(diffMs / 86400000);
      const hrs = Math.floor((diffMs % 86400000) / 3600000);
      const mins = Math.floor((diffMs % 3600000) / 60000);
      if (days > 0) {
        displayEl.textContent = `${days} day${days !== 1 ? 's' : ''}`;
        subDisplay.textContent = `${hrs} hr${hrs !== 1 ? 's' : ''}, ${mins} min`;
      } else {
        displayEl.textContent = `${hrs} hr${hrs !== 1 ? 's' : ''}, ${mins} min`;
        subDisplay.textContent = 'less than a day';
      }
      displayEl.className = 'countdown-display';
      const progress = totalMs > 0 ? Math.max(0, Math.min(100, ((totalMs - diffMs) / totalMs) * 100)) : 0;
      progressFill.style.width = progress + '%';
    } else if (diffMs > -86400000) {
      displayEl.textContent = 'Today!';
      displayEl.className = 'countdown-display countdown-today';
      subDisplay.textContent = data.countdownLabel || '';
      progressFill.style.width = '100%';
    } else {
      const daysAgo = Math.ceil(Math.abs(diffMs) / 86400000);
      displayEl.textContent = `${daysAgo} day${daysAgo !== 1 ? 's' : ''} ago`;
      displayEl.className = 'countdown-display countdown-past';
      subDisplay.textContent = '';
      progressFill.style.width = '100%';
    }
  }

  dateInput.addEventListener('change', () => {
    data.targetDate = dateInput.value || null;
    save();
    updateCountdown();
  });
  dateInput.addEventListener('keydown', e => e.stopPropagation());

  updateCountdown();
  intervalId = setInterval(updateCountdown, 60000);

  // Cleanup on card removal
  const observer = new MutationObserver(() => {
    if (!body.isConnected) { clearInterval(intervalId); observer.disconnect(); }
  });
  observer.observe(document.getElementById('canvas'), { childList: true, subtree: true });
}

// ── HABIT TRACKER CARD BODY ─────────────────────────────────
function buildHabitsBody(body, data) {
  if (!data.habits) data.habits = [];
  body.classList.add('habits-body');

  const wrap = document.createElement('div');
  wrap.className = 'habits-wrap';

  function getDay(offset) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d;
  }
  function dateStr(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  function dayLabel(d) { return ['S','M','T','W','T','F','S'][d.getDay()]; }

  const today = dateStr(new Date());
  const days = [];
  for (let i = -6; i <= 0; i++) {
    const d = getDay(i);
    days.push({ date: dateStr(d), label: dayLabel(d), isToday: i === 0 });
  }

  function calcStreak(habit) {
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = dateStr(d);
      if (habit.checks && habit.checks[key]) { streak++; d.setDate(d.getDate() - 1); }
      else break;
    }
    return streak;
  }

  function render() {
    wrap.innerHTML = '';

    // Day headers
    const header = document.createElement('div');
    header.className = 'habits-header';
    header.innerHTML = '<span></span>'; // empty for name column
    days.forEach(d => {
      const lbl = document.createElement('span');
      lbl.className = 'habits-day-label' + (d.isToday ? ' today' : '');
      lbl.textContent = d.label;
      header.appendChild(lbl);
    });
    header.innerHTML += '<span class="habits-day-label" title="Streak">&#128293;</span><span></span>';
    wrap.appendChild(header);

    // Habit rows
    data.habits.forEach(habit => {
      if (!habit.checks) habit.checks = {};
      const row = document.createElement('div');
      row.className = 'habits-row';

      const name = document.createElement('span');
      name.className = 'habits-name';
      name.textContent = habit.name;
      name.title = habit.name;
      row.appendChild(name);

      days.forEach(d => {
        const check = document.createElement('button');
        const isChecked = !!habit.checks[d.date];
        check.className = 'habits-check' + (isChecked ? ' checked' : '') + (d.isToday ? ' clickable' : '');
        if (d.isToday) {
          check.addEventListener('click', () => {
            habit.checks[d.date] = !habit.checks[d.date];
            if (!habit.checks[d.date]) delete habit.checks[d.date];
            save();
            render();
          });
        }
        row.appendChild(check);
      });

      // Streak
      const streak = calcStreak(habit);
      const streakEl = document.createElement('span');
      streakEl.className = 'habits-streak' + (streak > 0 ? ' active' : '');
      streakEl.textContent = streak > 0 ? streak : '';
      row.appendChild(streakEl);

      // Delete button (hidden, show on hover)
      const delBtn = document.createElement('button');
      delBtn.className = 'habits-delete';
      delBtn.innerHTML = '&times;';
      delBtn.title = 'Remove habit';
      delBtn.addEventListener('click', () => {
        data.habits = data.habits.filter(h => h.id !== habit.id);
        save();
        render();
      });
      row.appendChild(delBtn);

      wrap.appendChild(row);
    });

    // Add habit input
    const addDiv = document.createElement('div');
    addDiv.className = 'habits-add';
    const addInput = document.createElement('input');
    addInput.className = 'habits-add-input';
    addInput.type = 'text';
    addInput.placeholder = '+ add habit';
    addInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && addInput.value.trim()) {
        e.preventDefault();
        data.habits.push({ id: uid(), name: addInput.value.trim(), checks: {} });
        addInput.value = '';
        save();
        render();
      }
      e.stopPropagation();
    });
    addDiv.appendChild(addInput);
    wrap.appendChild(addDiv);
  }

  render();
  body.appendChild(wrap);
}

// ── USAGE CARD BODY ──────────────────────────────────────────
function buildUsageBody(body, data) {
  body.classList.add('usage-body');
  if (!data.usagePlan) data.usagePlan = 45;

  const wrap = document.createElement('div');
  wrap.style.padding = '10px 14px 10px 18px';

  // Stats row
  const stats = document.createElement('div');
  stats.className = 'usage-stats';
  const countEl = document.createElement('span');
  countEl.className = 'usage-count';
  countEl.textContent = '—';
  const pctEl = document.createElement('span');
  pctEl.className = 'usage-pct';
  pctEl.textContent = '';
  stats.appendChild(countEl);
  stats.appendChild(pctEl);
  wrap.appendChild(stats);

  // Progress bar
  const barWrap = document.createElement('div');
  barWrap.className = 'usage-bar-wrap';
  const bar = document.createElement('div');
  bar.className = 'usage-bar';
  bar.style.width = '0%';
  barWrap.appendChild(bar);
  wrap.appendChild(barWrap);

  // Reset timer
  const resetEl = document.createElement('div');
  resetEl.className = 'usage-reset';
  resetEl.textContent = '';
  wrap.appendChild(resetEl);

  // Plan selector
  const select = document.createElement('select');
  select.className = 'usage-plan-select';
  select.setAttribute('aria-label', 'Select Claude usage plan');
  select.addEventListener('mousedown', e => e.stopPropagation());
  [
    { v: 45,  l: 'Pro — 45 msgs / 5h' },
    { v: 225, l: 'Max 5x — 225 msgs / 5h' },
    { v: 900, l: 'Max 20x — 900 msgs / 5h' },
  ].forEach(({ v, l }) => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = l;
    if (v === data.usagePlan) opt.selected = true;
    select.appendChild(opt);
  });
  select.addEventListener('change', () => {
    data.usagePlan = parseInt(select.value, 10);
    save();
    refresh();
  });
  wrap.appendChild(select);
  body.appendChild(wrap);

  // Refresh logic
  async function refresh() {
    if (!window.electronAPI?.readClaudeUsage) {
      countEl.textContent = 'Electron only';
      pctEl.textContent = '';
      bar.style.width = '0%';
      resetEl.textContent = '';
      return;
    }
    try {
      const usage = await window.electronAPI.readClaudeUsage();
      const msgs  = usage.messages || 0;
      const limit = data.usagePlan || 45;
      const pct   = Math.min(100, Math.round((msgs / limit) * 100));

      countEl.textContent = `~${msgs} messages`;
      const barPct = Math.min(100, pct);
      pctEl.textContent   = pct >= 100 ? 'high usage' : `~${pct}%`;
      bar.style.width     = `${barPct}%`;
      bar.className       = 'usage-bar' + (pct >= 90 ? ' crit' : pct >= 70 ? ' warn' : '');

      // Estimate reset time (next 5h window boundary)
      const now   = Date.now();
      const windowMs = 5 * 60 * 60 * 1000;
      const msLeft = windowMs - (now % windowMs);
      const hrsLeft = Math.floor(msLeft / 3600000);
      const minsLeft = Math.floor((msLeft % 3600000) / 60000);
      resetEl.textContent = `Estimated · resets in ~${hrsLeft}h ${minsLeft}m`;
    } catch (e) {
      countEl.textContent = 'Error';
      pctEl.textContent = '';
    }
  }

  refresh();
  // Auto-refresh every 60s
  const interval = setInterval(refresh, 60000);
  // Clean up when card is removed from DOM
  const observer = new MutationObserver(() => {
    if (!document.contains(body)) { clearInterval(interval); observer.disconnect(); }
  });
  observer.observe(document.body, { childList: true, subtree: true });
}

// ── POMODORO ─────────────────────────────────────────────────
function buildPomodoroBody(body, data) {
  if (!data.workMins) data.workMins = 25;
  if (!data.breakMins) data.breakMins = 5;
  if (!data.longBreakMins) data.longBreakMins = 15;
  if (!data.sessionsTarget) data.sessionsTarget = 4;

  const CIRCUMFERENCE = 2 * Math.PI * 48;
  let timeLeft = data.workMins * 60;
  let totalTime = data.workMins * 60;
  let running = false;
  let intervalId = null;
  let session = 1;
  let isBreak = false;
  let isLongBreak = false;

  const wrap = document.createElement('div');
  wrap.className = 'pomodoro-wrap';

  // Ring
  const ringWrap = document.createElement('div');
  ringWrap.className = 'pomodoro-ring-wrap';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'pomodoro-ring');
  svg.setAttribute('viewBox', '0 0 110 110');
  const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  bgCircle.setAttribute('class', 'pomodoro-ring-bg');
  bgCircle.setAttribute('cx', '55'); bgCircle.setAttribute('cy', '55'); bgCircle.setAttribute('r', '48');
  const fgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  fgCircle.setAttribute('class', 'pomodoro-ring-fg');
  fgCircle.setAttribute('cx', '55'); fgCircle.setAttribute('cy', '55'); fgCircle.setAttribute('r', '48');
  fgCircle.style.strokeDasharray = CIRCUMFERENCE;
  fgCircle.style.strokeDashoffset = '0';
  svg.appendChild(bgCircle); svg.appendChild(fgCircle);
  ringWrap.appendChild(svg);

  const timeCenter = document.createElement('div');
  timeCenter.className = 'pomodoro-time';
  const timeDisplay = document.createElement('div');
  timeDisplay.className = 'pomodoro-time-display';
  const phaseLabel = document.createElement('div');
  phaseLabel.className = 'pomodoro-phase';
  phaseLabel.textContent = 'Work';
  const sessionLabel = document.createElement('div');
  sessionLabel.className = 'pomodoro-session';
  timeCenter.appendChild(timeDisplay);
  timeCenter.appendChild(phaseLabel);
  timeCenter.appendChild(sessionLabel);
  ringWrap.appendChild(timeCenter);
  wrap.appendChild(ringWrap);

  // Controls
  const controls = document.createElement('div');
  controls.className = 'pomodoro-controls';
  const startBtn = document.createElement('button');
  startBtn.className = 'pomodoro-btn';
  startBtn.textContent = 'Start';
  startBtn.addEventListener('mousedown', e => e.stopPropagation());
  const resetBtn = document.createElement('button');
  resetBtn.className = 'pomodoro-btn';
  resetBtn.textContent = 'Reset';
  resetBtn.addEventListener('mousedown', e => e.stopPropagation());
  controls.appendChild(startBtn); controls.appendChild(resetBtn);
  wrap.appendChild(controls);

  // Settings
  const settings = document.createElement('div');
  settings.className = 'pomodoro-settings';
  function settingRow(label, value, key) {
    const row = document.createElement('div');
    row.className = 'pomodoro-setting-row';
    const lbl = document.createElement('span');
    lbl.textContent = label;
    const inp = document.createElement('input');
    inp.type = 'number'; inp.min = '1'; inp.max = '120'; inp.value = value;
    inp.addEventListener('mousedown', e => e.stopPropagation());
    inp.addEventListener('change', () => {
      const v = Math.max(1, Math.min(120, parseInt(inp.value, 10) || value));
      inp.value = v; data[key] = v;
      if (!running) resetTimer();
      save();
    });
    row.appendChild(lbl); row.appendChild(inp);
    return row;
  }
  settings.appendChild(settingRow('Work (min)', data.workMins, 'workMins'));
  settings.appendChild(settingRow('Break (min)', data.breakMins, 'breakMins'));
  settings.appendChild(settingRow('Long break (min)', data.longBreakMins, 'longBreakMins'));
  wrap.appendChild(settings);

  body.appendChild(wrap);

  function formatTime(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }
  function updateDisplay() {
    timeDisplay.textContent = formatTime(timeLeft);
    sessionLabel.textContent = session + '/' + data.sessionsTarget;
    const progress = totalTime > 0 ? (totalTime - timeLeft) / totalTime : 0;
    fgCircle.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
    phaseLabel.textContent = isLongBreak ? 'Long Break' : isBreak ? 'Break' : 'Work';
  }
  function tick() {
    if (timeLeft > 0) {
      timeLeft--;
      updateDisplay();
    } else {
      clearInterval(intervalId); intervalId = null; running = false;
      startBtn.textContent = 'Start'; startBtn.classList.remove('active');
      if (!isBreak && !isLongBreak) {
        if (session >= data.sessionsTarget) {
          isLongBreak = true; isBreak = false;
          timeLeft = data.longBreakMins * 60; totalTime = timeLeft;
          session = 1;
          showPremiumToast('Break time! Long break.');
        } else {
          isBreak = true; isLongBreak = false;
          timeLeft = data.breakMins * 60; totalTime = timeLeft;
          showPremiumToast('Break time!');
        }
      } else {
        const wasLongBreak = isLongBreak;
        isBreak = false; isLongBreak = false;
        if (!wasLongBreak) session++;
        timeLeft = data.workMins * 60; totalTime = timeLeft;
        showPremiumToast('Back to work!');
      }
      updateDisplay();
      // Auto-start next phase
      running = true; startBtn.textContent = 'Pause'; startBtn.classList.add('active');
      intervalId = setInterval(tick, 1000);
    }
  }
  function resetTimer() {
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
    running = false; isBreak = false; isLongBreak = false; session = 1;
    timeLeft = data.workMins * 60; totalTime = timeLeft;
    startBtn.textContent = 'Start'; startBtn.classList.remove('active');
    updateDisplay();
  }
  startBtn.addEventListener('click', () => {
    if (running) {
      clearInterval(intervalId); intervalId = null; running = false;
      startBtn.textContent = 'Start'; startBtn.classList.remove('active');
    } else {
      running = true; startBtn.textContent = 'Pause'; startBtn.classList.add('active');
      intervalId = setInterval(tick, 1000);
    }
  });
  resetBtn.addEventListener('click', resetTimer);
  updateDisplay();

  // Clean up interval when card removed
  const pomObserver = new MutationObserver(() => {
    if (!document.contains(body)) { if (intervalId) clearInterval(intervalId); pomObserver.disconnect(); }
  });
  pomObserver.observe(document.body, { childList: true, subtree: true });
}

// ── RESIZE: BOTTOM HEIGHT ─────────────────────────────────────
function makeResizable(handle, body, data) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (data.locked) return;
    handle.classList.add('resizing'); isResizing = true;
    const startY = e.clientY, startH = body.offsetHeight;
    function onMove(e) {
      const cardEl  = body.closest('.card');
      const headerH = cardEl ? (cardEl.querySelector('.card-header') || {}).offsetHeight || 44 : 44;
      const maxByViewport = window.innerHeight - data.y - headerH - 8;
      const maxByPercent  = Math.floor(window.innerHeight * 0.8);
      const maxBodyH = Math.max(60, Math.min(maxByViewport, maxByPercent));
      const newH = Math.max(60, Math.min(startH + (e.clientY - startY), maxBodyH));
      body.style.flex = 'none'; body.style.height = newH + 'px';
      data.bodyHeight = newH;
      scheduleReflow(data.id);
    }
    function onUp() {
      handle.classList.remove('resizing'); isResizing = false;
      pushHistory(); save();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

// ── RESIZE: RIGHT EDGE WIDTH ──────────────────────────────────
function makeWidthResizable(handle, cardEl, data) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (data.locked) return;
    handle.classList.add('resizing'); isResizing = true;
    const startX = e.clientX, startW = cardEl.offsetWidth;
    function onMove(e) {
      const newW = Math.max(200, Math.min(600, startW + (e.clientX - startX)));
      cardEl.style.width = newW + 'px'; data.cardWidth = newW;
      scheduleReflow(data.id);
    }
    function onUp() {
      handle.classList.remove('resizing'); isResizing = false;
      pushHistory(); save();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

// ── RESIZE: CORNER (image) ────────────────────────────────────
function makeCornerResizable(handle, cardEl, data) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (data.locked) return;
    isResizing = true;
    const startX = e.clientX, startW = cardEl.offsetWidth;
    function onMove(e) {
      let newW = Math.max(160, startW + (e.clientX - startX));
      // Clamp height via aspect ratio before it overflows the viewport bottom
      if (data.imageAspectRatio) {
        const newH  = Math.round(newW / data.imageAspectRatio);
        const maxH  = window.innerHeight * 0.8;
        if (newH > maxH) newW = Math.round(maxH * data.imageAspectRatio);
      }
      // Clamp width so card doesn't run off the right edge
      const maxW = window.innerWidth - data.x - 8;
      newW = Math.min(newW, maxW);
      newW = Math.max(160, newW);
      cardEl.style.width = newW + 'px'; data.cardWidth = newW;
      scheduleReflow(data.id);
    }
    function onUp() {
      isResizing = false; pushHistory(); save();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

// ── SNAP GUIDE LINES ─────────────────────────────────────────
let activeSnapLines = [];
function clearSnapLines() { activeSnapLines.forEach(l => l.remove()); activeSnapLines = []; }
function showSnapLine(dir, pos, center) {
  const line = document.createElement('div');
  const SIZE = 160;
  line.style.position = 'fixed';
  line.style.pointerEvents = 'none';
  line.style.zIndex = '99998';
  if (dir === 'v') {
    line.style.width  = '1px';
    line.style.height = SIZE + 'px';
    line.style.left   = (pos - 0.5) + 'px';
    line.style.top    = (center - SIZE / 2) + 'px';
    line.style.background = 'linear-gradient(to bottom,transparent,rgba(124,109,250,0.7) 30%,rgba(124,109,250,0.7) 70%,transparent)';
  } else {
    line.style.height = '1px';
    line.style.width  = SIZE + 'px';
    line.style.top    = (pos - 0.5) + 'px';
    line.style.left   = (center - SIZE / 2) + 'px';
    line.style.background = 'linear-gradient(to right,transparent,rgba(124,109,250,0.7) 30%,rgba(124,109,250,0.7) 70%,transparent)';
  }
  document.body.appendChild(line);
  activeSnapLines.push(line);
}

// ── DRAG ──────────────────────────────────────────────────────
function makeDraggable(el, header, data) {
  header.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('button, input, [contenteditable="true"]')) return;
    if (data.locked) return;
    e.preventDefault();

    const ox = data.x, oy = data.y;
    const startX = e.clientX, startY = e.clientY;
    let dragStarted  = false;
    let pendingLinks = [];

    // ── Hold-to-group/ungroup state ───────────────
    let holdRing     = null;
    let holdRafId    = null;
    let holdTargetId = null;
    let holdType     = null; // 'join' | 'ungroup'

    function clearHoldRing() {
      if (holdRafId) { cancelAnimationFrame(holdRafId); holdRafId = null; }
      if (holdRing)  { holdRing.remove(); holdRing = null; }
      holdTargetId = null; holdType = null;
    }

    function startHoldRing(cx, cy, type, onComplete) {
      clearHoldRing();
      holdType = type;
      const SIZE = 44;
      holdRing = document.createElement('div');
      holdRing.className = 'group-hold-ring';
      holdRing.style.cssText = `width:${SIZE}px;height:${SIZE}px;left:${cx - SIZE/2}px;top:${cy - SIZE/2}px;`;
      document.getElementById('canvas').appendChild(holdRing);
      const start = performance.now();
      function tick(now) {
        const p   = Math.min((now - start) / GROUP_HOLD_MS, 1);
        const deg = Math.round(p * 360);
        const col = type === 'ungroup' ? '#f87171' : '#7c6dfa';
        holdRing.style.background =
          `conic-gradient(${col} ${deg}deg, rgba(255,255,255,0.08) ${deg}deg)`;
        if (p < 1) { holdRafId = requestAnimationFrame(tick); }
        else { clearHoldRing(); onComplete(); }
      }
      holdRafId = requestAnimationFrame(tick);
    }

    function onMove(e) {
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!dragStarted) {
        if (Math.sqrt(dx*dx + dy*dy) < DRAG_THRESH) return;
        dragStarted = true; isDragging = true;
        el.classList.add('dragging'); header.classList.add('grabbing');
        if (data.groupId) {
          const gf = document.querySelector(`.group-frame[data-group-id="${data.groupId}"]`);
          if (gf) gf.classList.add('group-dragging');
        }
        detachFromSnapGraph(data);
      }

      const rawX = ox + dx, rawY = oy + dy;
      const snap = computeSnap(rawX, rawY, el.offsetWidth, el.offsetHeight, data.id);
      const clamped = clampToViewport(snap.x, snap.y, el.offsetWidth, el.offsetHeight);

      clearSnapLines();
      snap.lines.forEach(l => showSnapLine(l.dir, l.pos, l.center));
      pendingLinks = snap.links;

      data.x = clamped.x; data.y = clamped.y;
      el.style.left = clamped.x + 'px'; el.style.top = clamped.y + 'px';

      // Update group frame to reflect new position
      if (data.groupId) updateGroupFrame(data.groupId);

      // ── Hold-to-group / ungroup ──────────────────
      const dragCx = data.x + el.offsetWidth  / 2;
      const dragCy = data.y + el.offsetHeight / 2;

      if (data.groupId) {
        // Leave group when dragged card center is 200px+ from every other member's center
        const g = groups.find(gg => gg.id === data.groupId);
        if (g) {
          const otherIds = g.memberIds.filter(id => id !== data.id);
          let closestDist = Infinity;
          for (const id of otherIds) {
            const mc  = cards.find(cc => cc.id === id);
            const mel = document.querySelector(`.card[data-id="${id}"]`);
            if (!mc || !mel) continue;
            const d = Math.hypot(
              dragCx - (mc.x + mel.offsetWidth  / 2),
              dragCy - (mc.y + mel.offsetHeight / 2)
            );
            if (d < closestDist) closestDist = d;
          }
          if (closestDist > 400) { pushHistory(); leaveGroup(data); }
        }
      } else {
        // Find nearest card by edge-to-edge distance — trigger at snap range
        let nearCard = null, nearOel = null, nearDist = Infinity;
        for (const other of cards) {
          if (other.id === data.id) continue;
          const oel = document.querySelector(`.card[data-id="${other.id}"]`);
          if (!oel) continue;
          // Axis-aligned edge-to-edge distance (0 when overlapping)
          const ex = Math.max(0, Math.max(data.x - (other.x + oel.offsetWidth), other.x - (data.x + el.offsetWidth)));
          const ey = Math.max(0, Math.max(data.y - (other.y + oel.offsetHeight), other.y - (data.y + el.offsetHeight)));
          const d  = Math.max(ex, ey);
          if (d < nearDist) { nearDist = d; nearCard = other; nearOel = oel; }
        }
        if (nearCard && nearDist < SNAP_DIST) {
          if (holdTargetId !== nearCard.id) {
            const rcx = nearCard.x + nearOel.offsetWidth  / 2;
            const rcy = nearCard.y + nearOel.offsetHeight / 2;
            startHoldRing(rcx, rcy, 'join', () => {
              pushHistory(); createGroup(data, nearCard);
            });
            holdTargetId = nearCard.id;
          }
        } else {
          if (holdRing) clearHoldRing();
        }
      }
    }

    function clearGroupDragging() {
      // Remove group-dragging class — card may have left the group by now, check all frames
      document.querySelectorAll('.group-frame.group-dragging').forEach(f => f.classList.remove('group-dragging'));
    }

    function onUp() {
      clearHoldRing();
      if (dragStarted) {
        el.classList.remove('dragging'); header.classList.remove('grabbing');
        clearGroupDragging();
        isDragging = false; clearSnapLines();
        attachToSnapGraph(data, pendingLinks, true);
        pushHistory(); save();
      }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      window.removeEventListener('blur', onBlur);
    }

    function onBlur() {
      if (isDragging) {
        clearHoldRing();
        el.classList.remove('dragging'); header.classList.remove('grabbing');
        clearGroupDragging();
        isDragging = false; clearSnapLines();
        attachToSnapGraph(data, pendingLinks, true);
        pushHistory(); save();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        window.removeEventListener('blur', onBlur);
      }
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    window.addEventListener('blur', onBlur);
  });
}

function bringToFront(el, data) {
  zCounter++; data.z = zCounter; el.style.zIndex = zCounter;
  touchLastEdited(data.id);
}

  const inEditable = active && (active.isContentEditable || active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    if (!inEditable) { e.preventDefault(); undoState(); }
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && !inEditable && selectedCardId) {
    e.preventDefault();

function setLocked(data, el, locked) {
  pushHistory();
  data.locked = locked;
  el.classList.toggle('locked', locked);

function duplicateCard(srcData) {
  pushHistory();
  // Deep-copy content fields
  const newData = JSON.parse(JSON.stringify(srcData));
  newData.id           = uid();
  newData.x            = srcData.x + 20;
  newData.y            = srcData.y + 20;
  newData.z            = ++zCounter;
  newData.snapParent   = null;
  newData.snapChildren = [];
  newData.locked       = false;
  newData.groupId      = null; // duplicates are independent, not in the same group

  // Offset new ids for todo items so they don't collide
  if (newData.items) newData.items = newData.items.map(it => ({ ...it, id: uid() }));

  // Clamp to viewport
  // (we'll read element size after insertion; default width is used for now)
  const clampedPos = clampToViewport(newData.x, newData.y, newData.cardWidth || 260, 200);
  newData.x = clampedPos.x; newData.y = clampedPos.y;

  cards.push(newData);
  const newEl = buildCard(newData);
  newEl.classList.add('spawning');
  document.getElementById('canvas').appendChild(newEl);
  newEl.addEventListener('animationend', () => newEl.classList.remove('spawning'), { once: true });

  // If source had a parent, add duplicate as sibling (same parent, same edge)
  if (srcData.snapParent) {
    attachToSnapGraph(newData, [{ toId: srcData.snapParent.id, myEdge: srcData.snapParent.edge }], true);
  }

  save();
}
