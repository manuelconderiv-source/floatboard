<script>
'use strict';

const ACCENTS        = ['#7c6dfa','#34d399','#fbbf24','#f87171','#60a5fa','#f472b6'];
const STORAGE_KEY    = 'floatboard_v3';
const GROUPS_KEY     = 'floatboard_groups_v1';
const SNAP_DIST      = 32;
const SNAP_GAP       = 12;
const DRAG_THRESH    = 6;
const HISTORY_MAX    = 50;
const GROUP_PAD      = 16;   // frame padding around member cards
const GROUP_HEADER_H = 36;   // frame header height
const GROUP_PROX     = 80;   // px center-to-center to trigger grouping
const GROUP_HOLD_MS  = 500;  // ms to hold before group action fires

let cards            = [];
let groups           = [];
let zCounter         = 10;
let history          = [];
let lastEditedCardId = null;
let selectedCardId   = null;
let isDragging       = false;
let isResizing       = false;

// ── STORAGE ───────────────────────────────────────────────────
let _saveTimer = null;
function save() {
  const json = JSON.stringify({ cards, groups });
  // Electron: persist to single file in home dir
  if (window.electronAPI && window.electronAPI.saveData) {
    window.electronAPI.saveData(json);
  }
  // Always mirror to localStorage as fallback
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  localStorage.setItem(GROUPS_KEY,  JSON.stringify(groups));
}
function scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(save, 150); }

// ── VIEWPORT CLAMP ────────────────────────────────────────────
// Returns {x, y} clamped so the card stays fully within the viewport.
function clampToViewport(x, y, w, h) {
  const maxX = Math.max(0, window.innerWidth  - w);
  const maxY = Math.max(0, window.innerHeight - h);
  return { x: Math.max(0, Math.min(x, maxX)), y: Math.max(0, Math.min(y, maxY)) };
}

// ── EMPTY STATE ───────────────────────────────────────────────
const emptyState = document.getElementById('empty-state');
function updateEmptyState() {
  emptyState.style.display = cards.length === 0 ? '' : 'none';
}

// Run on load and on window resize: nudge out-of-bounds cards back in,
// and clamp any body heights that exceed the 90vh limit.
function clampBodyHeights() {
  cards.forEach(c => {
    if (!c.bodyHeight) return;
    const el = document.querySelector(`.card[data-id="${c.id}"]`);
    if (!el) return;
    const headerEl = el.querySelector('.card-header');
    const headerH  = headerEl ? headerEl.offsetHeight : 44;
    const maxByViewport = window.innerHeight - c.y - headerH - 8;
    const maxByPercent  = Math.floor(window.innerHeight * 0.8);
    const maxBodyH = Math.max(60, Math.min(maxByViewport, maxByPercent));
    if (c.bodyHeight > maxBodyH) {
      c.bodyHeight = Math.max(60, maxBodyH);
      const bodyEl = el.querySelector('.card-body');
      if (bodyEl) { bodyEl.style.flex = 'none'; bodyEl.style.height = c.bodyHeight + 'px'; }
    }
  });
}

function clampAllCards() {
  cards.forEach(c => {
    const el = document.querySelector(`.card[data-id="${c.id}"]`);
    if (!el) return;
    const clamped = clampToViewport(c.x, c.y, el.offsetWidth, el.offsetHeight);
    if (clamped.x !== c.x || clamped.y !== c.y) {
      c.x = clamped.x; c.y = clamped.y;
      el.style.left = c.x + 'px'; el.style.top = c.y + 'px';
    }
  });
  clampBodyHeights();
}
window.addEventListener('resize', () => { clampAllCards(); scheduleSave(); });

// ── DEFAULTS ──────────────────────────────────────────────────
function defaultCards() {
  return [
    {
      id: uid(), type: 'todo', accent: '#7c6dfa', title: 'today',
      minimized: false, locked: false, groupId: null, x: 20, y: 60, z: 10,
      bodyHeight: null, cardWidth: null, snapParent: null, snapChildren: [],
      items: [
        {id:uid(),text:'dishes',done:false},
        {id:uid(),text:'flip fill v1.0 adjustments',done:false},
        {id:uid(),text:'send flip fill for review',done:false},
        {id:uid(),text:'finish DGO images',done:false},
        {id:uid(),text:'2 missing DGO sections layout',done:false},
        {id:uid(),text:'Framer section experiment',done:false},
        {id:uid(),text:'if works → Framer community',done:false},
        {id:uid(),text:'Aseprite scripts',done:false},
        {id:uid(),text:'dog walkie 16:30',done:false},
      ]
    },
    {
      id: uid(), type: 'text', accent: '#34d399', title: 'web libs',
      minimized: false, locked: false, groupId: null, x: 300, y: 60, z: 11,
      bodyHeight: null, cardWidth: null, snapParent: null, snapChildren: [],
      content: 'Aceternity UI → ui.aceternity.com\nMagic UI → magicui.design\nHover.dev → hover.dev\nUI Layout → ui-layout.com\nGSAP Showcase → gsap.com/showcase\nLottie → lottiefiles.com\nCult UI → cult-ui.com'
    }
  ];
}

// ── UTILS ─────────────────────────────────────────────────────
function uid()        { return Math.random().toString(36).slice(2,9) + Date.now().toString(36); }
function randAccent() { return ACCENTS[Math.floor(Math.random() * ACCENTS.length)]; }

function _hydrateCards(rawCards) {
  rawCards.forEach(c => {
    // Migrate old snapLinks format
    if (c.snapLinks !== undefined) {
      if (!c.snapParent && c.snapLinks.length)
        c.snapParent = { id: c.snapLinks[0].toId, edge: c.snapLinks[0].myEdge };
      delete c.snapLinks;
    }
    if (c.snapParent   === undefined) c.snapParent  = null;
    if (!c.snapChildren)              c.snapChildren = [];
    if (c.locked       === undefined) c.locked       = false;
    if (c.groupId      === undefined) c.groupId      = null;
  });
  // Rebuild snapChildren from snapParent (snapParent is source of truth)
  rawCards.forEach(c => {
    if (!c.snapParent) return;
    const parent = rawCards.find(p => p.id === c.snapParent.id);
    if (!parent) { c.snapParent = null; return; }
    if (!parent.snapChildren.some(ch => ch.id === c.id))
      parent.snapChildren.push({ id: c.id, edge: c.snapParent.edge });
  });
  return rawCards;
}

function _sanitizeGroups(grps) {
  grps = grps.filter(g => {
    g.memberIds = g.memberIds.filter(id => cards.some(c => c.id === id));
    if (g.memberIds.length < 2) {
      g.memberIds.forEach(id => { const c = cards.find(cc => cc.id === id); if (c) c.groupId = null; });
      return false;
    }
    return true;
  });
  cards.forEach(c => {
    if (c.groupId && !grps.some(g => g.id === c.groupId)) c.groupId = null;
  });
  return grps;
}

async function load() {
  let loaded = false;

  // Electron: try file-based storage first (single source of truth)
  if (window.electronAPI && window.electronAPI.loadData) {
    try {
      const result = await window.electronAPI.loadData();
      if (result.ok && result.data) {
        const parsed = JSON.parse(result.data);
        cards  = _hydrateCards(parsed.cards || []);
        groups = _sanitizeGroups(parsed.groups || []);
        loaded = true;
      }
    } catch(e) { console.warn('File load failed, falling back to localStorage', e); }
  }

  // Fallback: localStorage
  if (!loaded) {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        cards = _hydrateCards(JSON.parse(raw));
      } else {
        cards = defaultCards();
      }
    } catch(e) { cards = defaultCards(); }

    try {
      const raw = localStorage.getItem(GROUPS_KEY);
      groups = raw ? JSON.parse(raw) : [];
    } catch(e) { groups = []; }
    groups = _sanitizeGroups(groups);
  }

  if (cards.length === 0) cards = defaultCards();
}

// ── HISTORY ───────────────────────────────────────────────────
// Full-state snapshots. Max 50 items.
// Text input uses a 1500 ms debounce so a typing burst = one snapshot.
// Ctrl+Z inside contenteditable uses native browser undo (not intercepted).
const undoBtn = document.getElementById('undo-btn');

function pushHistory() {
  // Strip imageData from snapshots — images don't need to be undone and bloat memory.
  const cardSnap = cards.map(c => {
    if (c.type !== 'image') return c;
    const { imageData, ...rest } = c;
    return rest;
  });
  history.push(JSON.stringify({ cards: cardSnap, groups }));
  if (history.length > HISTORY_MAX) history.shift();
  undoBtn.disabled = false;
}

function undoState() {
  if (!history.length) return;
  const raw = JSON.parse(history.pop());
  // Support both old format (plain array) and new format ({cards, groups})
  const restoredCards  = Array.isArray(raw) ? raw        : (raw.cards  || []);
  const restoredGroups = Array.isArray(raw) ? []         : (raw.groups || []);
  // Re-inject imageData from current state by id
  restoredCards.forEach(c => {
    if (c.type === 'image') {
      const cur = cards.find(x => x.id === c.id);
      if (cur) c.imageData = cur.imageData;
    }
  });
  cards  = restoredCards;
  groups = restoredGroups;
  zCounter = Math.max(zCounter, ...cards.map(c => c.z || 0));
  renderAll();
  updateEmptyState();
  save();
  undoBtn.disabled = history.length === 0;
}

function touchLastEdited(id) { lastEditedCardId = id; }

undoBtn.addEventListener('click', e => { e.stopPropagation(); undoState(); });

// ── SPAWN POSITION ────────────────────────────────────────────
// Always spawn above the + button (bottom-right). lastEditedCard snap runs after.
function getSpawnPos(cardWidth) {
  const w   = cardWidth || 260;
  const raw = { x: window.innerWidth - w - 28, y: window.innerHeight - 320 - 88 };
  return clampToViewport(raw.x, raw.y, w, 200);
}

// ── SPRING ANIMATION ──────────────────────────────────────────
// Animates card DOM position from current rendered position → (targetX, targetY).
// Card data (x/y) must already be set to target before calling.
// Physics: stiffness K=280, damping D=24 (slightly underdamped).
// Stops when velocity < 0.5 and distance < 0.5.
function springElTo(cardData, cardEl, targetX, targetY) {
  if (cardData._springRaf) {
    cancelAnimationFrame(cardData._springRaf);
    cardData._springRaf = null;
  }
  let cx = parseFloat(cardEl.style.left) || targetX;
  let cy = parseFloat(cardEl.style.top)  || targetY;
  let vx = 0, vy = 0;
  const K = 280, D = 24, DT = 1/60;

  function tick() {
    vx += (K * (targetX - cx) - D * vx) * DT;
    vy += (K * (targetY - cy) - D * vy) * DT;
    cx += vx * DT;
    cy += vy * DT;
    cardEl.style.left = cx + 'px';
    cardEl.style.top  = cy + 'px';
    if (Math.abs(vx) < 0.5 && Math.abs(vy) < 0.5 &&
        Math.abs(targetX - cx) < 0.5 && Math.abs(targetY - cy) < 0.5) {
      cardEl.style.left = targetX + 'px';
      cardEl.style.top  = targetY + 'px';
      cardData._springRaf = null;
      return;
    }
    cardData._springRaf = requestAnimationFrame(tick);
  }
  cardData._springRaf = requestAnimationFrame(tick);
}

// ── SNAP COMPUTATION ──────────────────────────────────────────
function computeSnap(rawX, rawY, dragW, dragH, excludeId) {
  let sx = rawX, sy = rawY;
  const links = [], lines = [];

  for (const other of cards) {
    if (other.id === excludeId) continue;
    const otherEl = document.querySelector(`.card[data-id="${other.id}"]`);
    if (!otherEl) continue;
    const ow = otherEl.offsetWidth, oh = otherEl.offsetHeight;
    const ox = other.x, oy = other.y;

    // One card can only contribute one snap axis at a time.
    // If a horizontal snap triggers, skip vertical for this same card (and vice versa).
    let hSnapped = false;

    // Horizontal snap
    let lineX = null, hLink = null;
    if (Math.abs((rawX + dragW + SNAP_GAP) - ox) < SNAP_DIST) {
      sx = ox - dragW - SNAP_GAP; lineX = ox;
      hLink = { toId: other.id, myEdge: 'right', targetEdge: 'left' };
    } else if (Math.abs(rawX - (ox + ow + SNAP_GAP)) < SNAP_DIST) {
      sx = ox + ow + SNAP_GAP; lineX = ox + ow;
      hLink = { toId: other.id, myEdge: 'left', targetEdge: 'right' };
    }
    if (lineX !== null) {
      const yOpts = [
        { d: Math.abs(rawY - oy),                    y: oy                            },
        { d: Math.abs((rawY+dragH) - (oy+oh)),       y: oy+oh-dragH                   },
        { d: Math.abs((rawY+dragH/2) - (oy+oh/2)),   y: Math.round(oy+oh/2-dragH/2)  },
      ];
      const bestY = yOpts.reduce((a,b) => a.d < b.d ? a : b);
      if (bestY.d < SNAP_DIST) sy = bestY.y;
      lines.push({ dir: 'v', pos: lineX, center: Math.round((rawY + dragH/2 + oy + oh/2) / 2) });
      links.push(hLink);
      hSnapped = true;
    }

    // Vertical snap — skipped if this card already contributed a horizontal snap
    if (!hSnapped) {
      let lineY = null, vLink = null;
      if (Math.abs((rawY + dragH + SNAP_GAP) - oy) < SNAP_DIST) {
        sy = oy - dragH - SNAP_GAP; lineY = oy;
        vLink = { toId: other.id, myEdge: 'bottom', targetEdge: 'top' };
      } else if (Math.abs(rawY - (oy + oh + SNAP_GAP)) < SNAP_DIST) {
        sy = oy + oh + SNAP_GAP; lineY = oy + oh;
        vLink = { toId: other.id, myEdge: 'top', targetEdge: 'bottom' };
      }
      if (lineY !== null) {
        const xOpts = [
          { d: Math.abs(rawX - ox),                    x: ox                            },
          { d: Math.abs((rawX+dragW) - (ox+ow)),       x: ox+ow-dragW                   },
          { d: Math.abs((rawX+dragW/2) - (ox+ow/2)),   x: Math.round(ox+ow/2-dragW/2)  },
        ];
        const bestX = xOpts.reduce((a,b) => a.d < b.d ? a : b);
        if (bestX.d < SNAP_DIST) sx = bestX.x;
        lines.push({ dir: 'h', pos: lineY, center: Math.round((rawX + dragW/2 + ox + ow/2) / 2) });
        links.push(vLink);
      }
    }
  }

  return { x: sx, y: sy, links, lines };
}

// ── SNAP GRAPH ────────────────────────────────────────────────
// Edge semantics (from the CHILD card's perspective):
//   'top'    → child's top    touches parent's bottom  → child is BELOW parent
//   'bottom' → child's bottom touches parent's top     → child is ABOVE parent
//   'left'   → child's left   touches parent's right   → child is RIGHT OF parent
//   'right'  → child's right  touches parent's left    → child is LEFT OF parent
//
// Axis isolation rule:
//   Vertical edges   ('top','bottom') → only Y is recomputed on Y-axis changes.
//   Horizontal edges ('left','right') → only X is recomputed on X-axis changes.
//   Neither axis propagates to the other axis. Two spatially adjacent cards are
//   NOT in the same chain unless the user explicitly snapped them together.

// Cascade reflow all snap descendants of anchorId.
// useSpring=true → animate with spring (collapse/expand, collect, drag-end).
// Stops chain at viewport boundary — does not push overflow to next card.
function cascadeReflow(anchorId, visited = new Set(), useSpring = false) {
  if (visited.has(anchorId)) return;
  visited.add(anchorId);

  const anchor = cards.find(c => c.id === anchorId);
  if (!anchor || !anchor.snapChildren || !anchor.snapChildren.length) return;

  const anchorEl = document.querySelector(`.card[data-id="${anchorId}"]`);
  if (!anchorEl) return;
  const anchorW = anchorEl.offsetWidth;
  const anchorH = anchorEl.offsetHeight;

  for (const { id: childId, edge } of anchor.snapChildren) {
    const child = cards.find(c => c.id === childId);
    if (!child) continue;
    // Don't let external snap parents push cards that belong to a group
    if (child.groupId && child.groupId !== (anchor.groupId || '')) continue;
    const childEl = document.querySelector(`.card[data-id="${childId}"]`);
    if (!childEl) continue;
    const childW = childEl.offsetWidth;
    const childH = childEl.offsetHeight;

    let tx = child.x, ty = child.y;

    // Axis isolation: vertical edges only update Y, horizontal edges only update X
    if      (edge === 'top')    ty = anchor.y + anchorH + SNAP_GAP;
    else if (edge === 'bottom') ty = anchor.y - childH  - SNAP_GAP;
    else if (edge === 'left')   tx = anchor.x + anchorW + SNAP_GAP;
    else if (edge === 'right')  tx = anchor.x - childW  - SNAP_GAP;

    // Clamp to viewport. If clamping is needed, stop this branch of the chain.
    const clamped = clampToViewport(tx, ty, childW, childH);
    const wasClamped = clamped.x !== tx || clamped.y !== ty;
    tx = clamped.x; ty = clamped.y;

    child.x = tx; child.y = ty;

    if (useSpring && !isDragging && !isResizing) {
      springElTo(child, childEl, tx, ty);
    } else {
      if (child._springRaf) { cancelAnimationFrame(child._springRaf); child._springRaf = null; }
      childEl.style.left = tx + 'px';
      childEl.style.top  = ty + 'px';
    }

    // Stop recursion on this branch if we hit a wall
    if (!wasClamped) cascadeReflow(childId, visited, useSpring);
  }
}

// Detach card from snap graph at drag start.
// Re-parents same-direction children to grandparent (closes gap).
function detachFromSnapGraph(data) {
  const parentRef = data.snapParent;
  const parent    = parentRef ? cards.find(c => c.id === parentRef.id) : null;
  const myEdge    = parentRef ? parentRef.edge : null;

  if (parent) parent.snapChildren = parent.snapChildren.filter(ch => ch.id !== data.id);

  for (const { id: childId, edge } of (data.snapChildren || [])) {
    const child = cards.find(c => c.id === childId);
    if (!child) continue;
    if (parent && edge === myEdge) {
      child.snapParent = { id: parent.id, edge };
      parent.snapChildren.push({ id: childId, edge });
    } else {
      child.snapParent = null;
    }
  }

  if (parent) cascadeReflow(parent.id); // instant — gap closes during drag
  data.snapParent  = null;
  data.snapChildren = [];
}

// Attach card to snap graph at drag-end or spawn.
// Handles chain insertion: if parent already has a child at this edge,
// the dropped card slides between them (only within the same snap chain).
function attachToSnapGraph(data, snapLinks, useSpring = false) {
  if (!snapLinks || !snapLinks.length) return;
  const link   = snapLinks[0];
  const parent = cards.find(c => c.id === link.toId);
  if (!parent) return;
  const edge = link.myEdge;

  const existingRef = (parent.snapChildren || []).find(ch => ch.edge === edge);
  if (existingRef) {
    const existing = cards.find(c => c.id === existingRef.id);
    parent.snapChildren = parent.snapChildren.filter(ch => ch.id !== existingRef.id);
    if (existing) {
      existing.snapParent = { id: data.id, edge };
      data.snapChildren   = [{ id: existingRef.id, edge }];
    }
  }

  data.snapParent = { id: parent.id, edge };
  if (!parent.snapChildren) parent.snapChildren = [];
  parent.snapChildren.push({ id: data.id, edge });

  cascadeReflow(data.id, new Set(), useSpring);
}

// rAF-gated reflow for resize hot path (max once per frame)
let _reflowRaf = null;
function scheduleReflow(id) {
  if (_reflowRaf) cancelAnimationFrame(_reflowRaf);
  _reflowRaf = requestAnimationFrame(() => { _reflowRaf = null; cascadeReflow(id); });
}

// ── GROUP SYSTEM ──────────────────────────────────────────────

// Parse a hex color '#rrggbb' or '#rgb' → 'r, g, b' string for CSS rgba()
function hexToRgbStr(hex) {
  const h = hex.replace('#', '');
  let r, g, b;
  if (h.length === 3) {
    r = parseInt(h[0]+h[0], 16);
    g = parseInt(h[1]+h[1], 16);
    b = parseInt(h[2]+h[2], 16);
  } else {
    r = parseInt(h.slice(0,2), 16);
    g = parseInt(h.slice(2,4), 16);
    b = parseInt(h.slice(4,6), 16);
  }
  return isNaN(r) ? '255,255,255' : `${r},${g},${b}`;
}

// ── Group frame geometry ──────────────────────────────────────
function getGroupBounds(group) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  let found = false;
  for (const id of group.memberIds) {
    const c  = cards.find(cc => cc.id === id);
    const el = document.querySelector(`.card[data-id="${id}"]`);
    if (!c || !el) continue;
    found = true;
    minX = Math.min(minX, c.x);
    minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + el.offsetWidth);
    maxY = Math.max(maxY, c.y + el.offsetHeight);
  }
  return found ? { minX, minY, maxX, maxY } : null;
}

// ── Group frame DOM ───────────────────────────────────────────
function buildGroupFrame(group) {
  const bounds = getGroupBounds(group);
  if (!bounds) return null;
  const { minX, minY, maxX, maxY } = bounds;

  const frame = document.createElement('div');
  frame.className = 'group-frame';
  frame.dataset.groupId = group.id;

  const minZ = Math.max(1, Math.min(...group.memberIds
    .map(id => (cards.find(c => c.id === id) || {}).z || 1)) - 1);

  // Clamp frame so header is never off-screen
  let frameLeft = minX - GROUP_PAD;
  let frameTop  = minY - GROUP_PAD - GROUP_HEADER_H;
  const shiftX  = frameLeft < 0 ? -frameLeft : 0;
  const shiftY  = frameTop  < 0 ? -frameTop  : 0;
  if (shiftX || shiftY) {
    group.memberIds.forEach(id => {
      const c  = cards.find(cc => cc.id === id);
      const el = c && document.querySelector(`.card[data-id="${id}"]`);
      if (!c || !el) return;
      c.x += shiftX; c.y += shiftY;
      el.style.left = c.x + 'px'; el.style.top = c.y + 'px';
    });
    frameLeft += shiftX; frameTop += shiftY;
  }
  frame.style.cssText = [
    `left:${frameLeft}px`,
    `top:${frameTop}px`,
    `width:${maxX - minX + GROUP_PAD * 2}px`,
    `height:${maxY - minY + GROUP_PAD * 2 + GROUP_HEADER_H}px`,
    `z-index:${minZ}`,
    `--ga:${hexToRgbStr(group.accent)}`
  ].join(';');

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'group-header';

  const titleEl = document.createElement('div');
  titleEl.className   = 'group-title';
  titleEl.textContent = group.title || 'group';
  titleEl.addEventListener('dblclick', e => {
    e.stopPropagation();
    titleEl.setAttribute('contenteditable', 'true');
    titleEl.focus();
    const sel = window.getSelection(), r = document.createRange();
    r.selectNodeContents(titleEl); sel.removeAllRanges(); sel.addRange(r);
  });
  titleEl.addEventListener('blur', () => {
    titleEl.removeAttribute('contenteditable');
    group.title = titleEl.textContent.trim() || 'group';
    save();
  });
  titleEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
    e.stopPropagation();
  });
  titleEl.addEventListener('mousedown', e => {
    if (titleEl.hasAttribute('contenteditable')) e.stopPropagation();
  });

  const ungroupBtn = document.createElement('button');
  ungroupBtn.className = 'group-ungroup-btn';
  ungroupBtn.title     = 'Dissolve group';
  ungroupBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="4.5" height="4.5" rx="1"/><rect x="6.5" y="6.5" width="4.5" height="4.5" rx="1"/></svg>`;
  ungroupBtn.addEventListener('mousedown', e => e.stopPropagation());
  ungroupBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushHistory();
    dissolveGroup(group.id);
    save();
  });

  hdr.appendChild(titleEl);
  hdr.appendChild(ungroupBtn);
  frame.appendChild(hdr);
  makeGroupDraggable(hdr, group);

  frame.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    showGroupCtxMenu(group.id, e.clientX, e.clientY);
  });

  return frame;
}

function _insertGroupFrame(group, frame) {
  const canvas = document.getElementById('canvas');
  const firstMemberEl = document.querySelector(`.card[data-id="${group.memberIds[0]}"]`);
  if (firstMemberEl) canvas.insertBefore(frame, firstMemberEl);
  else canvas.appendChild(frame);
}

function renderGroupFrames() {
  groups.forEach(group => {
    const frame = buildGroupFrame(group);
    if (frame) _insertGroupFrame(group, frame);
  });
}

function updateGroupFrame(groupId) {
  const group = groups.find(g => g.id === groupId);
  if (!group) return;
  const frame = document.querySelector(`.group-frame[data-group-id="${groupId}"]`);
  if (!frame) {
    const f = buildGroupFrame(group);
    if (f) _insertGroupFrame(group, f);
    return;
  }
  const bounds = getGroupBounds(group);
  if (!bounds) return;
  const { minX, minY, maxX, maxY } = bounds;
  // Clamp frame so header is never off-screen
  let frameLeft = minX - GROUP_PAD;
  let frameTop  = minY - GROUP_PAD - GROUP_HEADER_H;
  const shiftX  = frameLeft < 0 ? -frameLeft : 0;
  const shiftY  = frameTop  < 0 ? -frameTop  : 0;
  if (shiftX || shiftY) {
    group.memberIds.forEach(id => {
      const c  = cards.find(cc => cc.id === id);
      const el = c && document.querySelector(`.card[data-id="${id}"]`);
      if (!c || !el) return;
      c.x += shiftX; c.y += shiftY;
      el.style.left = c.x + 'px'; el.style.top = c.y + 'px';
    });
    frameLeft += shiftX; frameTop += shiftY;
  }
  frame.style.left   = frameLeft + 'px';
  frame.style.top    = frameTop + 'px';
  frame.style.width  = (maxX - minX + GROUP_PAD * 2) + 'px';
  frame.style.height = (maxY - minY + GROUP_PAD * 2 + GROUP_HEADER_H) + 'px';
  frame.style.setProperty('--ga', hexToRgbStr(group.accent));
}

function removeGroupFrameEl(groupId) {
  const f = document.querySelector(`.group-frame[data-group-id="${groupId}"]`);
  if (f) f.remove();
}

// Resolve overlaps between group members after a card changes height.
// Only moves cards that are ACTUALLY overlapping — never displaces non-overlapping cards.
function resolveGroupOverlaps(groupId) {
  const g = groups.find(gg => gg.id === groupId);
  if (!g || g.memberIds.length < 2) return;
  const members = g.memberIds.map(id => ({
    c:  cards.find(cc => cc.id === id),
    el: document.querySelector(`.card[data-id="${id}"]`)
  })).filter(m => m.c && m.el);
  if (members.length < 2) return;

  // Sort top-to-bottom so we cascade pushes in one pass
  members.sort((a, b) => a.c.y !== b.c.y ? a.c.y - b.c.y : a.c.x - b.c.x);

  let moved = false;
  for (let i = 0; i < members.length - 1; i++) {
    const a = members[i];
    for (let j = i + 1; j < members.length; j++) {
      const b = members[j];
      // Check actual pixel overlap on both axes
      const ox = a.c.x < b.c.x + b.el.offsetWidth  && a.c.x + a.el.offsetWidth  > b.c.x;
      const oy = a.c.y < b.c.y + b.el.offsetHeight && a.c.y + a.el.offsetHeight > b.c.y;
      if (!ox || !oy) continue; // no overlap — leave untouched

      // Push in whichever axis requires the least travel
      const pushY = (a.c.y + a.el.offsetHeight + SNAP_GAP) - b.c.y;
      const pushX = (a.c.x + a.el.offsetWidth  + SNAP_GAP) - b.c.x;
      if (pushY <= pushX) {
        b.c.y += pushY;
        springElTo(b.c, b.el, b.c.x, b.c.y);
      } else {
        b.c.x += pushX;
        springElTo(b.c, b.el, b.c.x, b.c.y);
      }
      moved = true;
    }
  }
  if (moved) requestAnimationFrame(() => updateGroupFrame(groupId));
}

// Flash a ripple burst between two cards when a group forms
function showGroupRipple(cardA, cardB) {
  const elA = document.querySelector(`.card[data-id="${cardA.id}"]`);
  const elB = document.querySelector(`.card[data-id="${cardB.id}"]`);
  if (!elA || !elB) return;
  const rA = elA.getBoundingClientRect();
  const rB = elB.getBoundingClientRect();
  const cx = (rA.left + rA.right + rB.left + rB.right) / 4;
  const cy = (rA.top  + rA.bottom + rB.top + rB.bottom) / 4;
  const dx = rA.left + rA.width / 2 - cx;
  const dy = rA.top  + rA.height / 2 - cy;
  const size = Math.hypot(dx, dy) * 2 + Math.max(rA.width, rB.width) + 80;

  const ripple = document.createElement('div');
  ripple.className = 'group-ripple';
  ripple.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;border:2px solid rgba(255,255,255,0.25)`;
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 650);
}

// ── Group management ──────────────────────────────────────────
function createGroup(cardA, cardB) {
  if (cardA.groupId && cardA.groupId === cardB.groupId) return;
  if (cardB.groupId) { addToGroup(cardB.groupId, cardA); return; }
  if (cardA.groupId) { addToGroup(cardA.groupId, cardB); return; }

  const g = { id: uid(), title: 'group', accent: cardA.accent, memberIds: [cardA.id, cardB.id] };
  groups.push(g);
  cardA.groupId = g.id;
  cardB.groupId = g.id;

  // Auto-arrange: if cards overlap, reposition cardA so they don't collide
  const elA = document.querySelector(`.card[data-id="${cardA.id}"]`);
  const elB = document.querySelector(`.card[data-id="${cardB.id}"]`);
  if (elA && elB) {
    const wA = elA.offsetWidth, hA = elA.offsetHeight;
    const wB = elB.offsetWidth, hB = elB.offsetHeight;
    const overlapH = cardA.x < cardB.x + wB && cardA.x + wA > cardB.x;
    const overlapV = cardA.y < cardB.y + hB && cardA.y + hA > cardB.y;
    if (overlapH && overlapV) {
      // Determine axis from center-to-center vector
      const dx = (cardA.x + wA/2) - (cardB.x + wB/2);
      const dy = (cardA.y + hA/2) - (cardB.y + hB/2);
      if (Math.abs(dx) >= Math.abs(dy)) {
        // Horizontal: place A to left or right of B
        const tx = dx >= 0 ? cardB.x + wB + SNAP_GAP : cardB.x - wA - SNAP_GAP;
        cardA.x = tx;
        springElTo(cardA, elA, tx, cardA.y);
      } else {
        // Vertical: place A above or below B
        const ty = dy >= 0 ? cardB.y + hB + SNAP_GAP : cardB.y - hA - SNAP_GAP;
        cardA.y = ty;
        springElTo(cardA, elA, cardA.x, ty);
      }
    }
  }

  const frame = buildGroupFrame(g);
  if (frame) _insertGroupFrame(g, frame);

  showGroupRipple(cardA, cardB);
  save();
}

function addToGroup(groupId, cardData) {
  const g = groups.find(gg => gg.id === groupId);
  if (!g || g.memberIds.includes(cardData.id)) return;
  if (cardData.groupId && cardData.groupId !== groupId) leaveGroup(cardData, false);
  g.memberIds.push(cardData.id);
  cardData.groupId = groupId;
  updateGroupFrame(groupId);
  save();
}

function leaveGroup(cardData, doSave = true) {
  if (!cardData.groupId) return;
  const g = groups.find(gg => gg.id === cardData.groupId);
  if (!g) { cardData.groupId = null; return; }
  g.memberIds = g.memberIds.filter(id => id !== cardData.id);
  cardData.groupId = null;
  if (g.memberIds.length < 2) {
    dissolveGroup(g.id);
  } else {
    updateGroupFrame(g.id);
  }
  if (doSave) save();
}

function dissolveGroup(groupId) {
  const g = groups.find(gg => gg.id === groupId);
  if (!g) return;
  g.memberIds.forEach(id => {
    const c = cards.find(cc => cc.id === id);
    if (c) c.groupId = null;
  });
  groups = groups.filter(gg => gg.id !== groupId);
  removeGroupFrameEl(groupId);
}

// ── Group frame dragging — moves all member cards together ────
function makeGroupDraggable(hdr, group) {
  hdr.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('[contenteditable="true"], button')) return;
    e.preventDefault(); e.stopPropagation();

    const startX = e.clientX, startY = e.clientY;
    let dragStarted = false;
    const initPos = {};
    group.memberIds.forEach(id => {
      const c = cards.find(cc => cc.id === id);
      if (c) initPos[id] = { x: c.x, y: c.y };
    });

    function getFrame() { return document.querySelector(`.group-frame[data-group-id="${group.id}"]`); }

    function onMove(e) {
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!dragStarted) {
        if (Math.sqrt(dx*dx + dy*dy) < DRAG_THRESH) return;
        dragStarted = true; isDragging = true;
        hdr.classList.add('grabbing');
        const frame = getFrame(); if (frame) frame.classList.add('group-dragging');
        zCounter++;
        group.memberIds.forEach(id => {
          const c  = cards.find(cc => cc.id === id);
          const el = document.querySelector(`.card[data-id="${id}"]`);
          if (c && el) { c.z = zCounter; el.style.zIndex = zCounter; }
        });
      }
      group.memberIds.forEach(id => {
        const c    = cards.find(cc => cc.id === id);
        const el   = document.querySelector(`.card[data-id="${id}"]`);
        const init = initPos[id];
        if (!c || !el || !init) return;
        const cl = clampToViewport(init.x + dx, init.y + dy, el.offsetWidth, el.offsetHeight);
        c.x = cl.x; c.y = cl.y;
        el.style.left = cl.x + 'px'; el.style.top = cl.y + 'px';
      });
      updateGroupFrame(group.id);
    }

    function finish() {
      if (dragStarted) {
        hdr.classList.remove('grabbing');
        const frame = getFrame(); if (frame) frame.classList.remove('group-dragging');
        isDragging = false;
        pushHistory(); save();
      }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      window.removeEventListener('blur', onBlur);
    }
    function onUp()  { finish(); }
    function onBlur() { if (dragStarted) finish(); }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    window.addEventListener('blur', onBlur);
  });
}

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  selectedCardId = null;
  document.getElementById('canvas').innerHTML = '';
  cards.forEach(c => document.getElementById('canvas').appendChild(buildCard(c)));
  renderGroupFrames(); // insert frames behind their member cards
  updateEmptyState();
}

function buildCard(data) {
  if (!data.snapParent)   data.snapParent  = null;
  if (!data.snapChildren) data.snapChildren = [];
  if (data.locked === undefined) data.locked = false;

  const el = document.createElement('div');
  el.className = 'card' + (data.minimized ? ' minimized' : '') + (data.locked ? ' locked' : '');
  el.dataset.id = data.id;
  const cardW = data.cardWidth || 260;
  el.style.cssText = `left:${data.x}px;top:${data.y}px;z-index:${data.z};--accent:${data.accent};width:${cardW}px`;

  const accent = document.createElement('div');
  accent.className = 'card-accent';
  accent.style.background = data.accent;
  el.appendChild(accent);


  // ── Header ──────────────────────────────────
  const header = document.createElement('div');
  header.className = 'card-header';

  const title = document.createElement('div');
  title.className   = 'card-title';
  title.textContent = data.title || 'untitled';

  function commitTitle() {
    title.removeAttribute('contenteditable');
    title.style.cursor = '';
    const val = title.textContent.trim();
    data.title = val || 'untitled';
    title.textContent = data.title;
    save();
  }
  title.addEventListener('blur', commitTitle);
  title.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); title.blur(); }
    e.stopPropagation();
  });
  title.addEventListener('mousedown', e => {
    if (title.hasAttribute('contenteditable')) e.stopPropagation();
  });

  // Lock icon (only visible when locked) — placed before title.
  // Press and hold 2 s to unlock: a conic-gradient ring animates as progress.
  const lockIcon = document.createElement('span');
  lockIcon.className = 'lock-icon';
  lockIcon.innerHTML = `<svg width="11" height="12" viewBox="0 0 11 12" fill="none" stroke="white" style="stroke:white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="5" width="8" height="6.5" rx="1.5" fill="none"/><path d="M3 5V3.5a2.5 2.5 0 0 1 5 0V5"/></svg>`;
  lockIcon.style.display = data.locked ? '' : 'none';

  lockIcon.addEventListener('mousedown', e => {
    if (!data.locked) return;
    e.stopPropagation();

    // Build overlay ring — appended to header (position:relative) so it can be absolute
    const ring = document.createElement('div');
    const iconRect   = lockIcon.getBoundingClientRect();
    const headerRect = header.getBoundingClientRect();
    const cx = iconRect.left - headerRect.left + iconRect.width  / 2;
    const cy = iconRect.top  - headerRect.top  + iconRect.height / 2;
    const r  = 13;
    ring.style.cssText = `position:absolute;width:${r*2}px;height:${r*2}px;border-radius:50%;` +
                         `left:${cx-r}px;top:${cy-r}px;pointer-events:none;z-index:20;`;
    header.appendChild(ring);

    const DURATION  = 500;
    const startTime = performance.now();
    let rafId;

    function animateRing(now) {
      const progress = Math.min((now - startTime) / DURATION, 1);
      const deg = Math.round(progress * 360);
      ring.style.background =
        `conic-gradient(rgba(255,255,255,0.75) ${deg}deg, rgba(255,255,255,0.12) ${deg}deg)`;
      if (progress < 1) {
        rafId = requestAnimationFrame(animateRing);
      } else {
        ring.remove();
        setLocked(data, el, false);
      }
    }
    rafId = requestAnimationFrame(animateRing);

    function cancel() {
      cancelAnimationFrame(rafId);
      ring.remove();
      document.removeEventListener('mouseup',    cancel);
      lockIcon.removeEventListener('mouseleave', cancel);
    }
    document.addEventListener('mouseup',    cancel, { once: true });
    lockIcon.addEventListener('mouseleave', cancel, { once: true });
  });

  // Double-click header to rename (replaces pencil button)
  header.addEventListener('dblclick', e => {
    if (data.locked) return;
    if (e.target.closest('button')) return;
    title.setAttribute('contenteditable', 'true');
    title.style.cursor = 'text';
    title.focus();
    const sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(title);
    sel.removeAllRanges(); sel.addRange(range);
  });

  const minBtn = document.createElement('button');
  minBtn.className = 'card-btn minimize-btn';
  minBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 7.5l4-3 4 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  minBtn.title = data.minimized ? 'Expand' : 'Minimize';
  minBtn.addEventListener('mousedown', e => e.stopPropagation());
  minBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushHistory();
    data.minimized = !data.minimized;
    el.classList.toggle('minimized', data.minimized);
    minBtn.title = data.minimized ? 'Expand' : 'Minimize';
    save();
    requestAnimationFrame(() => {
      cascadeReflow(data.id, new Set(), true);
      if (data.groupId) resolveGroupOverlaps(data.groupId);
    });
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'card-btn delete-btn';
  delBtn.title     = 'Delete card';
  delBtn.innerHTML = '×'; delBtn.style.fontSize = '17px';
  delBtn.addEventListener('mousedown', e => e.stopPropagation());
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteCard(data, el);
  });

  header.appendChild(lockIcon);
  header.appendChild(title);
  header.appendChild(minBtn);
  header.appendChild(delBtn);
  el.appendChild(header);

  // ── Body ────────────────────────────────────
  const body = document.createElement('div');
  body.className = 'card-body';
  if (data.bodyHeight && data.type !== 'image') {
    body.style.flex   = 'none';
    body.style.height = data.bodyHeight + 'px';
  }

  if      (data.type === 'todo')  buildTodoBody(body, data);
  else if (data.type === 'text')  buildTextBody(body, data);
  else if (data.type === 'image') buildImageBody(body, data);

  el.appendChild(body);

  // ── Resize handles ───────────────────────────
  if (data.type === 'image') {
    const ch = document.createElement('div');
    ch.className = 'card-corner-resize';
    el.appendChild(ch);
    makeCornerResizable(ch, el, data);
  } else {
    const rh = document.createElement('div');
    rh.className = 'card-resize-handle';
    el.appendChild(rh);
    makeResizable(rh, body, data);

    const ew = document.createElement('div');
    ew.className = 'card-edge-resize';
    el.appendChild(ew);
    makeWidthResizable(ew, el, data);
  }

  makeDraggable(el, header, data);

  // Capture-phase mousedown: bring card forward and select it BEFORE any child handler runs.
  el.addEventListener('mousedown', () => {
    bringToFront(el, data);
    if (selectedCardId !== data.id) {
      if (selectedCardId) {
        const prev = document.querySelector(`.card[data-id="${selectedCardId}"]`);
        if (prev) prev.classList.remove('selected');
      }
      selectedCardId = data.id;
      el.classList.add('selected');
    }
  }, true);

  // Right-click context menu
  el.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e.clientX, e.clientY, data, el); });

  return el;
}

// ── DELETE CARD (shared by del button and context menu) ───────
function deleteCard(data, el) {
  pushHistory();
  if (data.groupId) leaveGroup(data, false); // remove from group before deleting
  const parentRef = data.snapParent;
  const parent    = parentRef ? cards.find(c => c.id === parentRef.id) : null;
  if (parent) parent.snapChildren = parent.snapChildren.filter(ch => ch.id !== data.id);
  for (const { id: childId, edge } of (data.snapChildren || [])) {
    const child = cards.find(c => c.id === childId);
    if (!child) continue;
    if (parent) { child.snapParent = { id: parent.id, edge }; parent.snapChildren.push({ id: childId, edge }); }
    else        { child.snapParent = null; }
  }
  if (data._springRaf) { cancelAnimationFrame(data._springRaf); data._springRaf = null; }
  data.snapParent = null; data.snapChildren = [];
  cards = cards.filter(c => c.id !== data.id);
  el.remove();
  if (parent) cascadeReflow(parent.id, new Set(), true);
  updateEmptyState();
  save();
}

// ── TODO ──────────────────────────────────────────────────────
function buildTodoBody(body, data) {
  if (!data.items) data.items = [];
  const list = document.createElement('ul');
  list.className = 'todo-list';
  let dragSrcIdx = null;

  function rebuildList() {
    list.innerHTML = '';
    data.items.forEach((item, idx) => list.appendChild(makeTodoItem(item, idx)));
  }

  function makeTodoItem(item, idx) {
    const li = document.createElement('li');
    li.className  = 'todo-item' + (item.done ? ' done' : '');
    li.draggable  = true;

    li.addEventListener('dragstart', e => {
      dragSrcIdx = idx; e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => li.style.opacity = '0.4', 0);
    });
    li.addEventListener('dragend',  () => li.style.opacity = '');
    li.addEventListener('dragover', e => {
      e.preventDefault();
      list.querySelectorAll('.todo-item').forEach(i => i.classList.remove('drag-over'));
      li.classList.add('drag-over');
    });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => {
      e.preventDefault(); li.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      pushHistory(); touchLastEdited(data.id);
      const moved = data.items.splice(dragSrcIdx, 1)[0];
      data.items.splice(idx, 0, moved);
      dragSrcIdx = null; save(); rebuildList();
    });

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.innerHTML = `<svg width="10" height="14" viewBox="0 0 10 14" fill="currentColor"><circle cx="3" cy="3" r="1.2"/><circle cx="7" cy="3" r="1.2"/><circle cx="3" cy="7" r="1.2"/><circle cx="7" cy="7" r="1.2"/><circle cx="3" cy="11" r="1.2"/><circle cx="7" cy="11" r="1.2"/></svg>`;
    handle.addEventListener('mousedown', e => e.stopPropagation());

    const cb = document.createElement('div');
    cb.className = 'todo-checkbox' + (item.done ? ' checked' : '');
    cb.addEventListener('mousedown', e => e.stopPropagation());
    cb.addEventListener('click', e => {
      e.stopPropagation();
      pushHistory(); touchLastEdited(data.id);
      item.done = !item.done;
      li.classList.toggle('done', item.done);
      cb.classList.toggle('checked', item.done);
      save();
    });

    const txt = document.createElement('div');
    txt.className       = 'todo-text';
    txt.contentEditable = 'true'; txt.spellcheck = false;
    txt.textContent     = item.text;
    txt.addEventListener('mousedown', e => e.stopPropagation());

    // 1500 ms debounce: one history snapshot per typing burst
    let txtHistTimer = null;
    txt.addEventListener('input', () => {
      clearTimeout(txtHistTimer);
      txtHistTimer = setTimeout(() => pushHistory(), 1500);
      touchLastEdited(data.id);
      item.text = txt.textContent;
      scheduleSave();
    });
    txt.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addInput.focus(); }
    });

    const del = document.createElement('button');
    del.className = 'todo-delete'; del.innerHTML = '×';
    del.addEventListener('mousedown', e => e.stopPropagation());
    del.addEventListener('click', e => {
      e.stopPropagation();
      pushHistory(); touchLastEdited(data.id);
      data.items.splice(idx, 1); save(); rebuildList();
    });

    li.appendChild(handle); li.appendChild(cb); li.appendChild(txt); li.appendChild(del);
    return li;
  }

  rebuildList();

  const addRow   = document.createElement('div');
  addRow.className = 'todo-add-row';
  const plusIcon = document.createElement('span');
  plusIcon.style.cssText  = 'font-size:14px;color:rgba(255,255,255,0.35);flex-shrink:0;line-height:1';
  plusIcon.textContent    = '+';
  const addInput = document.createElement('input');
  addInput.className   = 'todo-add-input';
  addInput.type        = 'text';
  addInput.placeholder = 'Add item…';
  addInput.addEventListener('mousedown', e => e.stopPropagation());
  addInput.addEventListener('focus', () => addRow.style.opacity = '1');
  addInput.addEventListener('blur',  () => addRow.style.opacity = '');
  addInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = addInput.value.trim(); if (!val) return;
      pushHistory(); touchLastEdited(data.id);
      data.items.push({ id: uid(), text: val, done: false });
      addInput.value = ''; save(); rebuildList();
    }
  });

  addRow.appendChild(plusIcon); addRow.appendChild(addInput);
  body.appendChild(list); body.appendChild(addRow);
}

// ── TEXT ──────────────────────────────────────────────────────
function buildTextBody(body, data) {
  const content = document.createElement('div');
  content.className       = 'text-content';
  content.contentEditable = 'true'; content.spellcheck = false;
  content.dataset.placeholder = 'Start typing…';
  if (data.content) content.innerHTML = data.content;
  content.addEventListener('mousedown', e => e.stopPropagation());

  // 1500 ms debounce. Ctrl+Z uses native browser undo inside contenteditable.
  let textHistTimer = null;
  content.addEventListener('input', () => {
    clearTimeout(textHistTimer);
    textHistTimer = setTimeout(() => pushHistory(), 1500);
    touchLastEdited(data.id);
    data.content = content.innerHTML;
    scheduleSave();
  });

  // Selection handling is done via global mouseup (see format toolbar section)

  body.appendChild(content);
}

// ── IMAGE ─────────────────────────────────────────────────────
function buildImageBody(body, data) {
  const zone      = document.createElement('div');
  zone.className  = 'image-zone';
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = 'image/*';
  fileInput.addEventListener('mousedown', e => e.stopPropagation());

  function renderZone() {
    zone.innerHTML = '';
    if (data.imageData) {
      const img  = document.createElement('img');
      img.src    = data.imageData;
      img.onload = () => { if (!data.imageAspectRatio) data.imageAspectRatio = img.naturalWidth / img.naturalHeight; };
      zone.appendChild(img);
    } else {
      const hint = document.createElement('div');
      hint.className = 'upload-hint';
      hint.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Click to upload</span>`;
      zone.appendChild(hint);
    }
    zone.appendChild(fileInput);
  }

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > MAX || h > MAX) {
          const ratio = Math.min(MAX / w, MAX / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.82);
        data.imageData = compressed;
        data.imageAspectRatio = w / h;
        try {
          save();
        } catch(e) {
          // localStorage quota exceeded — store in memory only
          console.warn('Storage full, image not persisted', e);
        }
        renderZone();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  zone.addEventListener('click', e => { if (e.target !== fileInput) fileInput.click(); });
  renderZone();
  body.appendChild(zone);
}

// ── RESIZE: BOTTOM HEIGHT ─────────────────────────────────────
function makeResizable(handle, body, data) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (data.locked) return;
    handle.classList.add('resizing'); isResizing = true;
    const startY = e.clientY, startH = body.offsetHeight;
    function onMove(e) {
      const cardEl  = body.closest('.card');
      const headerH = cardEl ? (cardEl.querySelector('.card-header') || {}).offsetHeight || 44 : 44;
      const maxByViewport = window.innerHeight - data.y - headerH - 8;
      const maxByPercent  = Math.floor(window.innerHeight * 0.8);
      const maxBodyH = Math.max(60, Math.min(maxByViewport, maxByPercent));
      const newH = Math.max(60, Math.min(startH + (e.clientY - startY), maxBodyH));
      body.style.flex = 'none'; body.style.height = newH + 'px';
      data.bodyHeight = newH;
      scheduleReflow(data.id);
    }
    function onUp() {
      handle.classList.remove('resizing'); isResizing = false;
      pushHistory(); save();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

// ── RESIZE: RIGHT EDGE WIDTH ──────────────────────────────────
function makeWidthResizable(handle, cardEl, data) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (data.locked) return;
    handle.classList.add('resizing'); isResizing = true;
    const startX = e.clientX, startW = cardEl.offsetWidth;
    function onMove(e) {
      const newW = Math.max(200, Math.min(600, startW + (e.clientX - startX)));
      cardEl.style.width = newW + 'px'; data.cardWidth = newW;
      scheduleReflow(data.id);
    }
    function onUp() {
      handle.classList.remove('resizing'); isResizing = false;
      pushHistory(); save();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

// ── RESIZE: CORNER (image) ────────────────────────────────────
function makeCornerResizable(handle, cardEl, data) {
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (data.locked) return;
    isResizing = true;
    const startX = e.clientX, startW = cardEl.offsetWidth;
    function onMove(e) {
      let newW = Math.max(160, startW + (e.clientX - startX));
      // Clamp height via aspect ratio before it overflows the viewport bottom
      if (data.imageAspectRatio) {
        const newH  = Math.round(newW / data.imageAspectRatio);
        const maxH  = window.innerHeight * 0.8;
        if (newH > maxH) newW = Math.round(maxH * data.imageAspectRatio);
      }
      // Clamp width so card doesn't run off the right edge
      const maxW = window.innerWidth - data.x - 8;
      newW = Math.min(newW, maxW);
      newW = Math.max(160, newW);
      cardEl.style.width = newW + 'px'; data.cardWidth = newW;
      scheduleReflow(data.id);
    }
    function onUp() {
      isResizing = false; pushHistory(); save();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
}

// ── SNAP GUIDE LINES ─────────────────────────────────────────
let activeSnapLines = [];
function clearSnapLines() { activeSnapLines.forEach(l => l.remove()); activeSnapLines = []; }
function showSnapLine(dir, pos, center) {
  const line = document.createElement('div');
  const SIZE = 160;
  line.style.position = 'fixed';
  line.style.pointerEvents = 'none';
  line.style.zIndex = '99998';
  if (dir === 'v') {
    line.style.width  = '1px';
    line.style.height = SIZE + 'px';
    line.style.left   = (pos - 0.5) + 'px';
    line.style.top    = (center - SIZE / 2) + 'px';
    line.style.background = 'linear-gradient(to bottom,transparent,rgba(124,109,250,0.7) 30%,rgba(124,109,250,0.7) 70%,transparent)';
  } else {
    line.style.height = '1px';
    line.style.width  = SIZE + 'px';
    line.style.top    = (pos - 0.5) + 'px';
    line.style.left   = (center - SIZE / 2) + 'px';
    line.style.background = 'linear-gradient(to right,transparent,rgba(124,109,250,0.7) 30%,rgba(124,109,250,0.7) 70%,transparent)';
  }
  document.body.appendChild(line);
  activeSnapLines.push(line);
}

// ── DRAG ──────────────────────────────────────────────────────
function makeDraggable(el, header, data) {
  header.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('button, input, [contenteditable="true"]')) return;
    if (data.locked) return;
    e.preventDefault();

    const ox = data.x, oy = data.y;
    const startX = e.clientX, startY = e.clientY;
    let dragStarted  = false;
    let pendingLinks = [];

    // ── Hold-to-group/ungroup state ───────────────
    let holdRing     = null;
    let holdRafId    = null;
    let holdTargetId = null;
    let holdType     = null; // 'join' | 'ungroup'

    function clearHoldRing() {
      if (holdRafId) { cancelAnimationFrame(holdRafId); holdRafId = null; }
      if (holdRing)  { holdRing.remove(); holdRing = null; }
      holdTargetId = null; holdType = null;
    }

    function startHoldRing(cx, cy, type, onComplete) {
      clearHoldRing();
      holdType = type;
      const SIZE = 44;
      holdRing = document.createElement('div');
      holdRing.className = 'group-hold-ring';
      holdRing.style.cssText = `width:${SIZE}px;height:${SIZE}px;left:${cx - SIZE/2}px;top:${cy - SIZE/2}px;`;
      document.getElementById('canvas').appendChild(holdRing);
      const start = performance.now();
      function tick(now) {
        const p   = Math.min((now - start) / GROUP_HOLD_MS, 1);
        const deg = Math.round(p * 360);
        const col = type === 'ungroup' ? '#f87171' : '#7c6dfa';
        holdRing.style.background =
          `conic-gradient(${col} ${deg}deg, rgba(255,255,255,0.08) ${deg}deg)`;
        if (p < 1) { holdRafId = requestAnimationFrame(tick); }
        else { clearHoldRing(); onComplete(); }
      }
      holdRafId = requestAnimationFrame(tick);
    }

    function onMove(e) {
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (!dragStarted) {
        if (Math.sqrt(dx*dx + dy*dy) < DRAG_THRESH) return;
        dragStarted = true; isDragging = true;
        el.classList.add('dragging'); header.classList.add('grabbing');
        if (data.groupId) {
          const gf = document.querySelector(`.group-frame[data-group-id="${data.groupId}"]`);
          if (gf) gf.classList.add('group-dragging');
        }
        detachFromSnapGraph(data);
      }

      const rawX = ox + dx, rawY = oy + dy;
      const snap = computeSnap(rawX, rawY, el.offsetWidth, el.offsetHeight, data.id);
      const clamped = clampToViewport(snap.x, snap.y, el.offsetWidth, el.offsetHeight);

      clearSnapLines();
      snap.lines.forEach(l => showSnapLine(l.dir, l.pos, l.center));
      pendingLinks = snap.links;

      data.x = clamped.x; data.y = clamped.y;
      el.style.left = clamped.x + 'px'; el.style.top = clamped.y + 'px';

      // Update group frame to reflect new position
      if (data.groupId) updateGroupFrame(data.groupId);

      // ── Hold-to-group / ungroup ──────────────────
      const dragCx = data.x + el.offsetWidth  / 2;
      const dragCy = data.y + el.offsetHeight / 2;

      if (data.groupId) {
        // Leave group when dragged card center is 200px+ from every other member's center
        const g = groups.find(gg => gg.id === data.groupId);
        if (g) {
          const otherIds = g.memberIds.filter(id => id !== data.id);
          let closestDist = Infinity;
          for (const id of otherIds) {
            const mc  = cards.find(cc => cc.id === id);
            const mel = document.querySelector(`.card[data-id="${id}"]`);
            if (!mc || !mel) continue;
            const d = Math.hypot(
              dragCx - (mc.x + mel.offsetWidth  / 2),
              dragCy - (mc.y + mel.offsetHeight / 2)
            );
            if (d < closestDist) closestDist = d;
          }
          if (closestDist > 400) { pushHistory(); leaveGroup(data); }
        }
      } else {
        // Find nearest card by edge-to-edge distance — trigger at snap range
        let nearCard = null, nearOel = null, nearDist = Infinity;
        for (const other of cards) {
          if (other.id === data.id) continue;
          const oel = document.querySelector(`.card[data-id="${other.id}"]`);
          if (!oel) continue;
          // Axis-aligned edge-to-edge distance (0 when overlapping)
          const ex = Math.max(0, Math.max(data.x - (other.x + oel.offsetWidth), other.x - (data.x + el.offsetWidth)));
          const ey = Math.max(0, Math.max(data.y - (other.y + oel.offsetHeight), other.y - (data.y + el.offsetHeight)));
          const d  = Math.max(ex, ey);
          if (d < nearDist) { nearDist = d; nearCard = other; nearOel = oel; }
        }
        if (nearCard && nearDist < SNAP_DIST) {
          if (holdTargetId !== nearCard.id) {
            const rcx = nearCard.x + nearOel.offsetWidth  / 2;
            const rcy = nearCard.y + nearOel.offsetHeight / 2;
            startHoldRing(rcx, rcy, 'join', () => {
              pushHistory(); createGroup(data, nearCard);
            });
            holdTargetId = nearCard.id;
          }
        } else {
          if (holdRing) clearHoldRing();
        }
      }
    }

    function clearGroupDragging() {
      // Remove group-dragging class — card may have left the group by now, check all frames
      document.querySelectorAll('.group-frame.group-dragging').forEach(f => f.classList.remove('group-dragging'));
    }

    function onUp() {
      clearHoldRing();
      if (dragStarted) {
        el.classList.remove('dragging'); header.classList.remove('grabbing');
        clearGroupDragging();
        isDragging = false; clearSnapLines();
        attachToSnapGraph(data, pendingLinks, true);
        pushHistory(); save();
      }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      window.removeEventListener('blur', onBlur);
    }

    function onBlur() {
      if (isDragging) {
        clearHoldRing();
        el.classList.remove('dragging'); header.classList.remove('grabbing');
        clearGroupDragging();
        isDragging = false; clearSnapLines();
        attachToSnapGraph(data, pendingLinks, true);
        pushHistory(); save();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        window.removeEventListener('blur', onBlur);
      }
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    window.addEventListener('blur', onBlur);
  });
}

function bringToFront(el, data) {
  zCounter++; data.z = zCounter; el.style.zIndex = zCounter;
  touchLastEdited(data.id);
}

  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {

function duplicateCard(srcData) {
  pushHistory();
  // Deep-copy content fields
  const newData = JSON.parse(JSON.stringify(srcData));
  newData.id           = uid();
  newData.x            = srcData.x + 20;
  newData.y            = srcData.y + 20;
  newData.z            = ++zCounter;
  newData.snapParent   = null;
  newData.snapChildren = [];
  newData.locked       = false;
  newData.groupId      = null; // duplicates are independent, not in the same group

  // Offset new ids for todo items so they don't collide
  if (newData.items) newData.items = newData.items.map(it => ({ ...it, id: uid() }));

  // Clamp to viewport
  // (we'll read element size after insertion; default width is used for now)
  const clampedPos = clampToViewport(newData.x, newData.y, newData.cardWidth || 260, 200);
  newData.x = clampedPos.x; newData.y = clampedPos.y;

  cards.push(newData);
  const newEl = buildCard(newData);
  document.getElementById('canvas').appendChild(newEl);

  // If source had a parent, add duplicate as sibling (same parent, same edge)
  if (srcData.snapParent) {
    attachToSnapGraph(newData, [{ toId: srcData.snapParent.id, myEdge: srcData.snapParent.edge }], true);
  }

  save();
}

// Unwrap all [data-fmt] spans in a subtree, keeping their children
function _flattenFmt(root) {
  Array.from(root.querySelectorAll('[data-fmt]')).forEach(s => {
    const p = s.parentNode; if (!p) return;
    while (s.firstChild) p.insertBefore(s.firstChild, s);
    p.removeChild(s);
  });
}

// Remove any [data-fmt] spans that ended up empty after DOM surgery
function _cleanEmpty(root) {
  Array.from(root.querySelectorAll('[data-fmt]')).forEach(s => {
    if (!s.textContent) s.remove();
  });
}

// Write all style properties onto a span element
function _applyStyleToSpan(span, style) {
  span.dataset.fmt      = style.label;
  span.style.fontSize   = style.fontSize;
  span.style.fontWeight = style.fontWeight;
  span.style.fontStyle  = style.fontStyle;
  span.style.color      = style.color;
}

function applyFmt(style) {
  if (!fmtContent || !fmtData) return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  if (!fmtContent.contains(range.commonAncestorContainer)) return;

  // ── Case A: selection sits entirely inside one fmt span ───────
  // This is the common case: click H1 text, change to FN, toggle off, etc.
  // Handle it with an in-place mutation — no extraction needed.
  const anchor = range.commonAncestorContainer;
  const anchorEl = anchor.nodeType === Node.TEXT_NODE ? anchor.parentElement : anchor;
  const enclosing = anchorEl.closest('[data-fmt]');

  if (enclosing && fmtContent.contains(enclosing)) {
    if (enclosing.dataset.fmt === style.label) {
      // Same style → toggle off (unwrap)
      const p = enclosing.parentNode;
      while (enclosing.firstChild) p.insertBefore(enclosing.firstChild, enclosing);
      p.removeChild(enclosing);
    } else {
      // Different style → restyle in-place, all properties replaced
      _applyStyleToSpan(enclosing, style);
    }
    fmtContent.normalize();
    fmtData.content = fmtContent.innerHTML;
    save();
    return;
  }

  // ── Case B: plain text or selection crossing multiple spans ───
  // Build a fresh span, extract the selection into it.
  const span = document.createElement('span');
  _applyStyleToSpan(span, style);

  try {
    // Works when the range doesn't partially straddle any element boundary
    range.surroundContents(span);
  } catch {
    // Range crosses element boundaries — extract, flatten, rewrap
    const frag = range.extractContents();
    _flattenFmt(frag);
    span.appendChild(frag);
    range.insertNode(span);
  }

  _cleanEmpty(fmtContent);
  fmtContent.normalize();
  fmtData.content = fmtContent.innerHTML;
  save();
}

// ── COLLECT / TIDY ────────────────────────────────────────────
// Multi-column layout that guarantees all cards stay inside viewport.
// Fills each column top-to-bottom until (innerHeight - 40px), then
// starts the next column. Column count grows as needed.
document.getElementById('collect-btn').addEventListener('click', () => {
  if (!cards.length) return;
  pushHistory();

  const maxH      = window.innerHeight - 40;
  const colStartX = 20;
  const colGap    = 12;

  // Clear all snap relationships; collect creates a fresh chain
  cards.forEach(c => { c.snapParent = null; c.snapChildren = []; });

  // Build items: single cards or group blocks (groups treated as one unit)
  const processedGroups = new Set();
  const sortedAll = [...cards].sort((a, b) => a.y - b.y || a.x - b.x);

  // items: { type:'card', data, h, w } | { type:'group', group, members:[{data,el,h,w,relY}], h, w }
  const items = [];
  for (const d of sortedAll) {
    if (d.groupId) {
      if (processedGroups.has(d.groupId)) continue;
      processedGroups.add(d.groupId);
      const g = groups.find(gg => gg.id === d.groupId);
      if (!g) { // orphaned groupId — treat as regular card
        const e = document.querySelector(`.card[data-id="${d.id}"]`);
        items.push({ type: 'card', data: d, h: e ? e.offsetHeight : 200, w: e ? e.offsetWidth : 260 });
        continue;
      }
      const members = g.memberIds
        .map(id => {
          const c = cards.find(cc => cc.id === id);
          const e = document.querySelector(`.card[data-id="${id}"]`);
          return c && e ? { data: c, el: e, h: e.offsetHeight, w: e.offsetWidth } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.data.y - b.data.y);
      if (!members.length) continue;
      const baseY = members[0].data.y;
      members.forEach(m => { m.relY = m.data.y - baseY; });
      const groupW = Math.max(...members.map(m => m.w));
      const groupH = members[members.length-1].relY + members[members.length-1].h;
      items.push({ type: 'group', group: g, members,
        w: groupW + GROUP_PAD * 2,
        h: GROUP_HEADER_H + GROUP_PAD + groupH + GROUP_PAD });
    } else {
      const e = document.querySelector(`.card[data-id="${d.id}"]`);
      items.push({ type: 'card', data: d,
        h: e ? e.offsetHeight : (d.minimized ? 44 : 200),
        w: e ? e.offsetWidth  : (d.cardWidth || 260) });
    }
  }

  // Lay out items into columns
  const cols  = [];
  let colX    = colStartX;
  let colData = { x: colX, items: [] };
  let curColH = 0;
  for (const item of items) {
    const gap = colData.items.length > 0 ? SNAP_GAP : 0;
    if (curColH + gap + item.h > maxH && colData.items.length > 0) {
      cols.push(colData);
      const prevMaxW = Math.max(...colData.items.map(it => it.w));
      colX += prevMaxW + colGap;
      colData = { x: colX, items: [] };
      curColH = 0;
    }
    colData.items.push(item);
    curColH += gap + item.h;
  }
  if (colData.items.length) cols.push(colData);

  // Anchor to toolbar side
  const TOOLBAR_MARGIN = 28 + 48 + 12;
  const totalW = cols.reduce((sum, col, i) => {
    const colW = Math.max(...col.items.map(it => it.w));
    return sum + colW + (i < cols.length - 1 ? colGap : 0);
  }, 0);
  let offsetX;
  if (document.body.classList.contains('snapped-left')) {
    offsetX = TOOLBAR_MARGIN - colStartX;
  } else {
    const rightEdge = window.innerWidth - TOOLBAR_MARGIN;
    offsetX = rightEdge - totalW;
  }
  cols.forEach(col => { col.x += offsetX; });

  // Position items
  cols.forEach(col => {
    let y = 20;
    const ungroupedSeq = []; // track ungrouped cards for snap-chain rebuild
    col.items.forEach(item => {
      if (item.type === 'card') {
        item.data.x = col.x; item.data.y = y;
        const e = document.querySelector(`.card[data-id="${item.data.id}"]`);
        if (e) springElTo(item.data, e, col.x, y);
        ungroupedSeq.push(item.data);
        y += item.h + SNAP_GAP;
      } else {
        // Group block: place members at their relative positions inside the block
        const baseX = col.x + GROUP_PAD;
        const baseY = y + GROUP_HEADER_H + GROUP_PAD;
        item.members.forEach(({ data: d, el, relY }) => {
          const nx = baseX, ny = baseY + relY;
          d.x = nx; d.y = ny;
          if (el) springElTo(d, el, nx, ny);
        });
        y += item.h + SNAP_GAP;
      }
    });
    // Rebuild snap chain for ungrouped cards only
    for (let i = 1; i < ungroupedSeq.length; i++) {
      const prev = ungroupedSeq[i-1], curr = ungroupedSeq[i];
      curr.snapParent   = { id: prev.id, edge: 'top' };
      prev.snapChildren = [{ id: curr.id, edge: 'top' }];
    }
  });

  // Update all group frames to reflect new positions
  groups.forEach(g => updateGroupFrame(g.id));

  setTimeout(save, 650);
});

const addBtn = document.getElementById('add-btn');
const picker = document.getElementById('picker');

addBtn.addEventListener('click', e => {
  e.stopPropagation();
  // If toolbar is open, collapse it — then still open the picker
  if (document.body.classList.contains('toolbar-open')) {
    document.body.classList.remove('toolbar-open');
  }
  picker.classList.toggle('visible');
  addBtn.classList.toggle('open');
});
document.addEventListener('click', () => {
  picker.classList.remove('visible');
  addBtn.classList.remove('open');
});
picker.addEventListener('click', e => e.stopPropagation());

document.querySelectorAll('.picker-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    const pos  = getSpawnPos(null);
    const newCard = {
      id: uid(), type,
      accent: randAccent(),
      title: type === 'todo' ? 'new list' : type === 'text' ? 'note' : 'image',
      minimized: false, locked: false, groupId: null,
      x: pos.x, y: pos.y,
      z: ++zCounter,
      bodyHeight: null, cardWidth: null, snapParent: null, snapChildren: [],
      items:   type === 'todo' ? [] : undefined,
      content: type === 'text' ? '' : undefined,
      imageData: null, imageAspectRatio: null,
    };
    pushHistory();
    cards.push(newCard);
    save();
    const cardEl = buildCard(newCard);
    document.getElementById('canvas').appendChild(cardEl);
    updateEmptyState();
    picker.classList.remove('visible');
    addBtn.classList.remove('open');

    requestAnimationFrame(() => {
      const anchor   = lastEditedCardId ? cards.find(c => c.id === lastEditedCardId) : null;
      const anchorEl = anchor && anchor.id !== newCard.id
        ? document.querySelector(`.card[data-id="${anchor.id}"]`) : null;
      let snapped = false;

      if (anchor && anchorEl) {
        const aW = anchorEl.offsetWidth, aH = anchorEl.offsetHeight;
        const hasBottomChild = (anchor.snapChildren || []).some(ch => ch.edge === 'top');
        let sx, sy, edge;
        if (!hasBottomChild) { sx = anchor.x; sy = anchor.y + aH + SNAP_GAP; edge = 'top'; }
        else                  { sx = anchor.x + aW + SNAP_GAP; sy = anchor.y; edge = 'left'; }
        const clamped = clampToViewport(sx, sy, cardEl.offsetWidth, cardEl.offsetHeight);
        newCard.x = clamped.x; newCard.y = clamped.y;
        cardEl.style.left = clamped.x + 'px'; cardEl.style.top = clamped.y + 'px';
        attachToSnapGraph(newCard, [{ toId: anchor.id, myEdge: edge }]);
        save(); snapped = true;
      }

      if (!snapped) {
        const snap = computeSnap(newCard.x, newCard.y, cardEl.offsetWidth, cardEl.offsetHeight, newCard.id);
        if (snap.links.length) {
          const clamped = clampToViewport(snap.x, snap.y, cardEl.offsetWidth, cardEl.offsetHeight);
          newCard.x = clamped.x; newCard.y = clamped.y;
          cardEl.style.left = clamped.x + 'px'; cardEl.style.top = clamped.y + 'px';
          attachToSnapGraph(newCard, snap.links);
          save();
        }
      }

      const titleEl = cardEl.querySelector('.card-title');
      if (titleEl) {
        titleEl.setAttribute('contenteditable', 'true');
        titleEl.style.cursor = 'text'; titleEl.focus();
        const sel = window.getSelection(), range = document.createRange();
        range.selectNodeContents(titleEl);
        sel.removeAllRanges(); sel.addRange(range);
      }
    });
  });
});

function showCanvasCtxMenu(mx, my) {

  function item(label, fn, danger = false) {

    d.className   = 'ctx-item' + (danger ? ' danger' : '');

  item('Export cards (JSON)', () => {
    const withImages = confirm('Include images in export?\n\nYes = larger file (~MB)\nNo = smaller file, images excluded');
    const data = cards.map(c => {
      if (!withImages && c.type === 'image') {

      }
      return c;

    a.href     = url;
    a.download = 'floatboard-export.json';
